<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CardBoard">
<title>CardBoard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f18;--s1:#161927;--s2:#1c2030;--s3:#232740;
  --b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.14);
  --accent:#5b8dee;--a2:#7c5cfc;
  --ok:#27c485;--ng:#e8506a;--warn:#f09c2a;
  --text:#dde2f2;--t2:#7a849f;--t3:#3a4058;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
  --tbh:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
*{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.12) transparent;}

/* ── Topbar ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:calc(46px + var(--st));padding-top:var(--st);display:flex;align-items:center;justify-content:space-between;padding-left:calc(16px + var(--sl));padding-right:calc(16px + var(--sr));background:rgba(13,15,24,0.9);backdrop-filter:saturate(180%) blur(28px);-webkit-backdrop-filter:saturate(180%) blur(28px);border-bottom:1px solid var(--b1);}
.topbar-logo{font-size:17px;font-weight:700;letter-spacing:.2px;}
.topbar-logo em{color:var(--accent);font-style:normal;}
.icon-btn{background:rgba(255,255,255,0.07);border:1px solid var(--b1);border-radius:8px;color:var(--t2);cursor:pointer;font-size:16px;padding:5px 10px;line-height:1;transition:.15s;font-family:var(--sans);}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── Pages ── */
.pages{position:fixed;top:calc(46px + var(--st));bottom:calc(var(--tbh) + var(--sb));left:0;right:0;overflow:hidden;}
.page{display:none;height:100%;overflow-y:auto;padding:14px calc(14px + var(--sr)) 14px calc(14px + var(--sl));-webkit-overflow-scrolling:touch;}
.page.on{display:block;}

/* ── Bottom tabs ── */
.btabs{position:fixed;bottom:0;left:0;right:0;z-index:200;height:calc(var(--tbh) + var(--sb));padding-bottom:var(--sb);padding-left:var(--sl);padding-right:var(--sr);display:flex;background:rgba(13,15,24,0.9);backdrop-filter:saturate(180%) blur(28px);-webkit-backdrop-filter:saturate(180%) blur(28px);border-top:1px solid var(--b1);}
.btab{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--t2);font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.2px;padding:4px 2px;transition:color .18s;position:relative;}
.btab.on{color:var(--accent);}
.btab-icon{font-size:19px;line-height:1.1;width:26px;height:22px;display:flex;align-items:center;justify-content:center;}
.btab.on::after{content:'';position:absolute;top:5px;width:42px;height:38px;border-radius:12px;background:rgba(91,141,238,0.11);border:1px solid rgba(91,141,238,0.18);z-index:-1;}

/* ── PC Sidebar ── */
.sidebar{display:none;}
@media(min-width:768px){
  body{overflow:auto!important;}
  .topbar{left:250px;height:50px;padding-top:0;padding-left:24px;padding-right:24px;}
  .topbar-logo{font-size:18px;}
  .btabs{display:none!important;}
  .pages{top:50px!important;bottom:0!important;left:250px!important;right:0!important;}
  .page{max-width:1120px;margin:0 auto;}
  .hero-val{font-size:40px!important;}
  .sidebar{display:flex!important;flex-direction:column;position:fixed;top:0;left:0;bottom:0;width:250px;background:rgba(13,15,24,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--b1);padding:22px 14px;z-index:300;}
  .sidebar-logo{font-size:18px;font-weight:700;padding:8px 10px 22px;letter-spacing:.2px;}
  .sidebar-logo em{color:var(--accent);font-style:normal;}
  .sidebar-btn{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--t2);padding:10px 12px;border-radius:10px;margin-bottom:3px;transition:.15s;text-align:left;width:100%;}
  .sidebar-btn:hover{background:rgba(255,255,255,0.05);color:var(--text);}
  .sidebar-btn.on{background:rgba(91,141,238,0.15);color:var(--accent);border:1px solid rgba(91,141,238,0.2);}
  .sidebar-btn-icon{font-size:17px;width:24px;text-align:center;display:flex;align-items:center;justify-content:center;}
  .sidebar-settings{margin-top:auto;}
  #dash-body{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
  #dash-body .hero{grid-column:1/-1;}
}

/* ── Month switcher ── */
.month-sw{display:flex;gap:3px;background:var(--s2);border-radius:11px;padding:3px;margin-bottom:13px;border:1px solid var(--b1);}
.msw-btn{flex:1;background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--t2);padding:9px 6px;border-radius:8px;transition:.18s;text-align:center;}
.msw-btn.on{background:var(--s3);color:var(--accent);box-shadow:0 1px 6px #0005;}

/* ── Hero ── */
.hero{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:18px;margin-bottom:13px;}
.hero-lbl{font-size:11px;color:var(--t2);letter-spacing:.4px;margin-bottom:5px;}
.hero-val{font-family:var(--mono);font-size:32px;font-weight:500;letter-spacing:-1px;line-height:1;}
.hero-val.ok{color:var(--ok);}
.hero-val.warn{color:var(--warn);}
.hero-val.ng{color:var(--ng);}
.hero-sub{font-size:12px;color:var(--t2);margin-top:5px;}
.hero-pills{display:flex;gap:8px;margin-top:13px;padding-top:13px;border-top:1px solid var(--b1);}
.hero-pill{flex:1;background:var(--s2);border-radius:10px;padding:10px 12px;border:1px solid var(--b1);}
.hero-pill-lbl{font-size:10px;color:var(--t2);margin-bottom:3px;letter-spacing:.3px;}
.hero-pill-val{font-family:var(--mono);font-size:14px;font-weight:500;}
.hero-pill-val.pos{color:var(--ok);}
.hero-pill-val.neg{color:var(--ng);}

/* ── Section ── */
.sec{margin-bottom:13px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.sec-title{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.6px;text-transform:uppercase;}
.gb{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;}
.sec-divider{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:6px 13px 4px;background:var(--s2);border-bottom:1px solid rgba(255,255,255,0.04);}

/* ── Row ── */
.row{display:flex;align-items:center;gap:8px;padding:11px 13px;border-bottom:1px solid rgba(255,255,255,0.04);transition:background .1s;}
.row:last-child{border-bottom:none;}
.row-drag{cursor:grab;color:var(--t3);font-size:14px;flex-shrink:0;}
.row-lbl{flex:1;font-size:14px;}
.row-lbl.done{color:var(--t2);text-decoration:line-through;}
.row-val{font-family:var(--mono);font-size:14px;}
.row-val.pos{color:var(--ok);}
.row-val.neg{color:var(--ng);}
.row-val.zero{color:var(--t3);}
.row-edit-btn{background:none;border:1px solid var(--b2);border-radius:6px;color:var(--t2);cursor:pointer;font-size:11px;padding:3px 8px;flex-shrink:0;transition:.15s;}
.row-edit-btn:hover{border-color:var(--accent);color:var(--accent);}
.chk{width:21px;height:21px;border-radius:6px;border:1.5px solid var(--b2);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.15s;}
.chk.on{background:var(--ok);border-color:var(--ok);color:#fff;}
.rdel{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:0 2px;flex-shrink:0;transition:.15s;}
.rdel:hover{color:var(--ng);}
.add-strip{display:flex;gap:6px;padding:9px 13px;border-top:1px solid rgba(255,255,255,0.04);}
.add-pill{background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.1);border-radius:7px;color:var(--t2);cursor:pointer;font-family:var(--sans);font-size:12px;padding:7px 11px;transition:.15s;}
.add-pill:hover{border-color:var(--accent);color:var(--accent);}
.req{color:var(--ng);font-size:10px;margin-left:2px;}

/* ── Edit mode toggle ── */
.edit-mode-btn{background:none;border:1px solid var(--b2);border-radius:7px;color:var(--t2);cursor:pointer;font-size:11px;font-family:var(--sans);font-weight:600;padding:4px 10px;transition:.15s;}
.edit-mode-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(91,141,238,0.1);}

/* ── Card accordion ── */
.cacc-head{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);transition:background .1s;}
.cacc-name{flex:1;font-size:14px;font-weight:500;}
.cacc-date{font-size:11px;color:var(--t2);font-family:var(--mono);white-space:nowrap;}
.cacc-date.soon{color:var(--warn);}
.cacc-date.tod{color:var(--ng);font-weight:700;}
.cacc-amt{font-family:var(--mono);font-size:14px;min-width:70px;text-align:right;}
.cacc-amt.zero{color:var(--t3);}
.cacc-chev{font-size:11px;color:var(--t2);transition:transform .2s;flex-shrink:0;}
.cacc-chev.open{transform:rotate(180deg);}
.cacc-body{display:none;padding:10px 13px 13px;background:rgba(0,0,0,0.18);border-bottom:1px solid rgba(255,255,255,0.04);}
.cacc-body.open{display:block;}
.cacc-meta{font-size:12px;color:var(--t2);margin-bottom:9px;line-height:1.9;}
.cacc-months{display:flex;flex-direction:column;gap:7px;}
.cacc-month-row{display:flex;align-items:center;gap:7px;}
.cacc-month-lbl{font-size:11px;color:var(--t2);width:48px;flex-shrink:0;}
.cacc-input{flex:1;background:var(--bg);border:1px solid var(--b2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:15px;padding:8px 10px;outline:none;transition:.15s;-webkit-appearance:none;text-align:right;}
.cacc-input:focus{border-color:var(--accent);}
.cacc-save{background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:700;padding:8px 13px;transition:.15s;white-space:nowrap;}
.cacc-save:hover{opacity:.85;}
.ann-badge{font-size:10px;background:rgba(240,156,42,0.15);color:var(--warn);border:1px solid rgba(240,156,42,0.25);border-radius:4px;padding:1px 5px;flex-shrink:0;}

/* ── Banners ── */
.tutorial-banner{background:linear-gradient(135deg,rgba(91,141,238,0.15),rgba(124,92,252,0.15));border:1px solid rgba(91,141,238,0.3);border-radius:12px;padding:13px 14px;margin-bottom:13px;}
.tutorial-banner-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.tutorial-banner-body{font-size:12px;color:var(--t2);line-height:1.8;}
.backup-banner{background:rgba(240,156,42,0.12);border:1px solid rgba(240,156,42,0.3);border-radius:10px;padding:9px 13px;margin-bottom:11px;font-size:12px;color:var(--warn);display:flex;align-items:center;justify-content:space-between;gap:8px;}

/* ── Calendar ── */
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
.cal-nav h2{font-size:16px;font-weight:700;flex:1;text-align:center;}
.cal-nav-btn{background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t2);cursor:pointer;font-size:18px;padding:5px 12px;line-height:1;transition:.15s;}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.cal-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:13px;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--s2);border-bottom:1px solid var(--b1);}
.cal-dow{padding:7px 2px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--t2);}
.cal-dow.sun{color:#ff7088;}
.cal-dow.sat{color:var(--accent);}
/* 固定幅グリッド */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.ccell{border-right:1px solid rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.04);min-height:72px;padding:4px 3px;overflow:hidden;}
.ccell:nth-child(7n){border-right:none;}
.ccell.dim{opacity:.22;}
.ccell.today{background:rgba(91,141,238,0.06);}
.cday{font-size:12px;font-weight:700;font-family:var(--mono);margin-bottom:2px;line-height:1.4;}
.ccell.csun .cday,.ccell.chol .cday{color:#ff7088;}
.ccell.csat .cday{color:var(--accent);}
.holnm{font-size:8px;color:#ff7088;line-height:1;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cchip{font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cchip.bill{background:rgba(232,80,106,0.18);color:#ff8098;border-left:2px solid var(--ng);}
.cchip.inc{background:rgba(39,196,133,0.15);color:#52e0a4;border-left:2px solid var(--ok);}
.cchip.io{background:rgba(124,92,252,0.15);color:#b8a4ff;border-left:2px solid var(--a2);}
.cchip.ann{background:rgba(240,156,42,0.15);color:#ffc060;border-left:2px solid var(--warn);}
.cal-legend{display:flex;gap:9px;padding:8px 13px;border-top:1px solid var(--b1);flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--t2);}
.leg-dot{width:7px;height:7px;border-radius:2px;}
.cal-pie-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:13px;}
.cal-pie-title{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;}
.cal-pie-inner{display:flex;gap:12px;align-items:center;}
.cal-pie-canvas-wrap{position:relative;width:130px;height:130px;flex-shrink:0;}
.cal-pie-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.cal-pie-center-lbl{font-size:10px;color:var(--t2);}
.cal-pie-center-val{font-family:var(--mono);font-size:14px;font-weight:500;}
.pie-leg-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;overflow:hidden;}
.pie-leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.pie-leg-name{font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pie-leg-val{font-family:var(--mono);font-size:11px;color:var(--t2);flex-shrink:0;}

/* ── Stats ── */
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:13px;margin-bottom:11px;}
.stat-sec-title{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:9px;}

/* ── Wallet ── */
.wallet-wrap{display:flex;flex-direction:column;gap:12px;}
.wallet-card{position:relative;border-radius:18px;padding:20px;min-height:120px;cursor:pointer;transition:transform .18s,box-shadow .18s;user-select:none;overflow:hidden;border:2px solid rgba(255,255,255,0.12);}
.wallet-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.22);}
.wallet-card.expanded{box-shadow:0 12px 40px rgba(0,0,0,0.5);border-color:rgba(255,255,255,0.3);}
.wallet-card-brand{position:absolute;top:14px;right:14px;}
.wallet-card-name{font-size:15px;font-weight:700;color:rgba(255,255,255,0.95);margin-bottom:auto;}
.wallet-card-meta{display:flex;gap:16px;margin-top:8px;}
.wallet-card-meta-item{display:flex;flex-direction:column;}
.wallet-card-meta-lbl{font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:.8px;text-transform:uppercase;}
.wallet-card-meta-val{font-family:var(--mono);font-size:12px;color:rgba(255,255,255,0.85);}
.wallet-card-detail{background:rgba(0,0,0,0.25);border-radius:12px;padding:12px;margin-top:12px;display:none;}
.wallet-card.expanded .wallet-card-detail{display:block;}
.wallet-card-detail-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.08);font-size:12px;}
.wallet-card-detail-row:last-child{border-bottom:none;}
.wallet-card-detail-lbl{color:rgba(255,255,255,0.5);}
.wallet-card-detail-val{font-family:var(--mono);color:rgba(255,255,255,0.9);display:flex;align-items:center;gap:6px;}
.copy-btn{background:rgba(255,255,255,0.1);border:none;border-radius:5px;color:rgba(255,255,255,0.7);cursor:pointer;font-size:10px;padding:2px 7px;transition:.15s;}
.copy-btn:hover{background:rgba(255,255,255,0.2);}
.wallet-actions{display:flex;gap:6px;margin-top:10px;}
.wallet-add-btn{width:100%;background:rgba(91,141,238,0.1);border:2px dashed rgba(91,141,238,0.3);border-radius:16px;color:var(--accent);cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:600;padding:16px;margin-bottom:80px;transition:.15s;}
.wallet-add-btn:hover{background:rgba(91,141,238,0.18);}
.wallet-vis-off{opacity:.6;}

/* Brand SVGs */
.brand-icon svg{display:block;}

/* ── Settings ── */
.st-wrap{padding-bottom:8px;}
.st-sec{margin-bottom:18px;}
.st-sec-title{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;}
.st-row{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px 13px;margin-bottom:7px;cursor:pointer;transition:.15s;}
.st-row:hover{border-color:var(--b2);}
.st-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;font-family:var(--sans);}
.st-body{flex:1;}
.st-lbl{font-size:14px;font-weight:500;}
.st-sub{font-size:12px;color:var(--t2);margin-top:2px;}
.st-arr{color:var(--t2);font-size:16px;}
.st-hint{font-size:12px;color:var(--t3);margin-bottom:7px;}
.tab-order-item{display:flex;align-items:center;gap:9px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:grab;user-select:none;transition:.15s;}
.tab-order-item.dragging{opacity:.4;border-color:var(--accent);}
.tab-order-item.drag-over{border-color:var(--accent);background:var(--s3);}
.tab-order-item.hidden-tab{opacity:.45;}
.tab-order-handle{color:var(--t2);font-size:14px;flex-shrink:0;}
.tab-order-icon{font-size:17px;flex-shrink:0;width:24px;text-align:center;display:flex;align-items:center;justify-content:center;}
.tab-order-name{flex:1;font-size:14px;font-weight:500;}
.vis-toggle-btn{background:rgba(255,255,255,0.06);border:1px solid var(--b1);border-radius:14px;color:var(--t2);cursor:pointer;font-size:11px;font-weight:700;padding:3px 10px;white-space:nowrap;transition:.15s;}
.vis-toggle-btn.on{background:rgba(91,141,238,0.15);border-color:rgba(91,141,238,0.3);color:var(--accent);}
.author-banner{background:linear-gradient(135deg,rgba(91,141,238,0.1),rgba(124,92,252,0.1));border:1px solid rgba(91,141,238,0.2);border-radius:12px;padding:15px;text-align:center;margin-bottom:7px;cursor:pointer;transition:.15s;}

function mkMonth(ymStr){return{ym:ymStr,balance:0,items:[],cardAmounts:{}};}
function getDisplayYms(){const d=new Date(),y=d.getFullYear(),m=d.getMonth()+1;return[ym(y,m),ym(m===12?y+1:y,m===12?1:m+1)];}
function ym(y,m){return`${y}-${z2(m)}`;}

function loadState(){
  try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}
  const[y0,y1]=getDisplayYms();

function save(){localStorage.setItem(SK,JSON.stringify(S));}
let S=loadState();
function getMD(ymStr){if(!S.months[ymStr])S.months[ymStr]=mkMonth(ymStr);return S.months[ymStr];}

// 翌月balance・固定項目同期
function syncNextMonthBalance(){
  const[y0,y1]=getDisplayYms();
  const md0=getMD(y0),md1=getMD(y1);
  md1.balance=Math.max(0,calcNet(y0));
  const fixedSorted=md0.items.filter(it=>it.isFixed).sort((a,b)=>(a.order||0)-(b.order||0));
  fixedSorted.forEach(src=>{
    const ex=md1.items.find(it=>it.id===src.id&&it.isFixed);
    if(ex){Object.assign(ex,{order:src.order,label:src.label,amount:src.amount,day:src.day,dayMode:src.dayMode});}
    else{md1.items.push({...src,checked:false});}
  });
  md1.items=md1.items.filter(it=>!it.isFixed||fixedSorted.find(s=>s.id===it.id));
}

const HL={
  '2025-01-01':'元日','2025-01-13':'成人の日','2025-02-11':'建国記念日',

  '2025-10-13':'スポーツの日','2025-11-03':'文化の日','2025-11-23':'勤労感謝の日','2025-11-24':'振替休日',
  '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念日',
  '2026-02-23':'天皇誕生日','2026-03-20':'春分の日','2026-04-29':'昭和の日',

  '2026-11-03':'文化の日','2026-11-23':'勤労感謝の日',
};
function fmtD(d){return`${d.getFullYear()}-${z2(d.getMonth()+1)}-${z2(d.getDate())}`;}
function isHL(d){return HL[fmtD(d)]||null;}
function isNBD(d){const w=d.getDay();return w===0||w===6||!!isHL(d);}
function prevBiz(y,m,day){let d=new Date(y,m-1,day);while(isNBD(d))d=new Date(d.getTime()-864e5);return d;}
function nextBiz(y,m,day){let d=new Date(y,m-1,day);while(isNBD(d))d=new Date(d.getTime()+864e5);return d;}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function z2(n){return String(n).padStart(2,'0');}
function fy(n){if(isNaN(n)||n==null)return'¥0';const a=Math.abs(Math.round(n));return(n<0?'-¥':'¥')+a.toLocaleString('ja-JP');}
function ymLbl(y){const[yr,mo]=y.split('-');return`${yr}年${parseInt(mo)}月`;}
function todayStr(){return fmtD(new Date());}
function toHalf(v){return String(v).replace(/[０-９－＋．]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[ー−]/g,'-');}
function fmtAmt(v){if(v===''||v==null)return'';const n=parseFloat(String(v).replace(/,/g,''));return isNaN(n)?'':n.toLocaleString('ja-JP');}
function parseAmt(v){return parseFloat(toHalf(String(v)).replace(/,/g,''))||0;}
function fmtAmtInput(v){const h=toHalf(v);const raw=h.replace(/[^0-9\-]/g,'');if(raw===''||raw==='-')return raw;const neg=raw.startsWith('-');const num=parseInt(raw.replace('-',''),10);if(isNaN(num))return'';return(neg?'-':'')+num.toLocaleString('ja-JP');}

function calcAssets(ymStr){
  const md=getMD(ymStr);
  const chk=(md.items||[]).filter(it=>it.checked&&it.amount>0).reduce((s,it)=>s+it.amount,0);
  const exp=(md.items||[]).filter(it=>it.checked&&it.amount<0).reduce((s,it)=>s+it.amount,0);
  return(md.balance||0)+chk+exp;
}
function calcLiab(ymStr){
  const md=getMD(ymStr),[,m]=ymStr.split('-').map(Number);
  const vis=S.cards.filter(c=>c.visible);
  return vis.reduce((s,c)=>s+(md.cardAmounts[c.id]||0),0)
        +vis.filter(c=>c.annualFee>0&&c.annualMonth===m).reduce((s,c)=>s+c.annualFee,0);
}
function calcNet(ymStr){return calcAssets(ymStr)-calcLiab(ymStr);}

function applyDayMode(y,m,day,mode){
  const dim=new Date(y,m,0).getDate(),safe=Math.min(day,dim);
  if(mode==='next') return nextBiz(y,m,safe);
  if(mode==='exact') return new Date(y,m-1,safe);
  return prevBiz(y,m,safe);
}

  if(!order.includes('cards'))order.push('cards');
  const defs=order.map(id=>TAB_DEFS.find(t=>t.id===id)).filter(Boolean);
  TAB_DEFS.forEach(t=>{if(!defs.find(d=>d.id===t.id))defs.push(t);});
  const hidden=S.tabHidden||[];
  const tabDefs=defs.filter(t=>t.id!=='settings'&&!(hidden.includes(t.id)&&!t.fixed));

  document.getElementById('btabs').innerHTML=tabDefs.map(t=>
    `<button class="btab${t.id===activeTab?' on':''}" data-tab="${t.id}" onclick="goTab('${t.id}')">
      <span class="btab-icon">${t.icon}</span><span>${t.label}</span>
    </button>`
  ).join('');

  const nav=document.getElementById('sidebar-nav');
  if(nav)nav.innerHTML=tabDefs.map(t=>
    `<button class="sidebar-btn${t.id===activeTab?' on':''}" data-tab="${t.id}" onclick="goTab('${t.id}')">
      <span class="sidebar-btn-icon">${t.icon}</span>${t.label}
    </button>`
  ).join('');
}

function goTab(id){
  activeTab=id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  const pg=document.getElementById('pg-'+id);
  if(pg)pg.classList.add('on');
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('on'));
  const btab=document.querySelector(`.btab[data-tab="${id}"]`);
  if(btab)btab.classList.add('on');
  document.querySelectorAll('.sidebar-btn[data-tab]').forEach(b=>b.classList.remove('on'));
  const sbtn=document.querySelector(`.sidebar-btn[data-tab="${id}"]`);
  if(sbtn)sbtn.classList.add('on');
  const stBtn=document.querySelector('.sidebar-settings .sidebar-btn');
  if(stBtn)stBtn.classList.toggle('on',id==='settings');
  if(id==='dash')    renderDash();
  if(id==='cal')     renderCal();
  if(id==='stats')   renderStats();
  if(id==='cards')   renderCards();
  if(id==='settings')renderSettings();
}

function _saveEditItem(id,isFixed){
  const l=document.getElementById('ei_l').value.trim();
  const a=parseAmt(document.getElementById('ei_a').value);
  const dv=document.getElementById('ei_d').value;
  const day=dv?parseInt(dv.split('-')[2]):null;
  const dayMode=document.getElementById('ei_dm').value;
  if(!l){alert('項目名を入力してください');return;}
  const yms=getDisplayYms();
  const targets=isFixed?yms:[_mYm];
  targets.forEach(y=>{
    const it=(getMD(y).items||[]).find(x=>x.id===id);
    if(it){it.label=l;it.amount=a;it.day=day;it.dayMode=dayMode;}
  });
  save();mClose();renderDash();
}
let _dragItemId=null;
function itemDragStart(e){_dragItemId=parseInt(e.currentTarget.dataset.itemId);e.dataTransfer.effectAllowed='move';}
function itemDragOver(e){e.preventDefault();}
function itemDrop(e,ymStr){
  e.preventDefault();
  const targetId=parseInt(e.currentTarget.dataset.itemId);
  if(!_dragItemId||_dragItemId===targetId)return;
  const md=getMD(ymStr),items=md.items;
  const src=items.find(i=>i.id===_dragItemId),tgt=items.find(i=>i.id===targetId);
  if(!src||!tgt||src.isFixed!==tgt.isFixed)return;
  const so=src.order,to=tgt.order;src.order=to;tgt.order=so;
  if(src.isFixed){
    const md1=getMD(getDisplayYms()[1]);
    const s1=md1.items.find(i=>i.id===src.id),t1=md1.items.find(i=>i.id===tgt.id);
    if(s1&&t1){s1.order=to;t1.order=so;}
  }
  save();renderDash();
}

// CALENDAR
// ═══════════════════════════════════════════
let calYm=(()=>{const d=new Date();return ym(d.getFullYear(),d.getMonth()+1);})();
const _calCharts={};

function calMove(d){let[y,m]=calYm.split('-').map(Number);m+=d;if(m>12){m=1;y++;}if(m<1){m=12;y--;}calYm=ym(y,m);renderCal();}

function renderCal(){
  document.getElementById('cal-lbl').textContent=ymLbl(calYm);
  const[y,m]=calYm.split('-').map(Number),md=getMD(calYm);
  const ev={};
  function add(ds,e){if(!ev[ds])ev[ds]=[];ev[ds].push(e);}

  const billByDate={};
  S.cards.filter(c=>c.visible).forEach(c=>{
    const raw=c.billDay===99?new Date(y,m,0).getDate():c.billDay;
    const ds=fmtD(nextBiz(y,m,raw));
    billByDate[ds]=(billByDate[ds]||0)+(md.cardAmounts[c.id]||0);
  });
  Object.entries(billByDate).forEach(([ds,t])=>{if(t>0)add(ds,{cls:'bill',lbl:`引落 ${fy(t)}`});});
  S.cards.filter(c=>c.visible&&c.annualFee>0&&c.annualMonth===m).forEach(c=>{
    add(fmtD(nextBiz(y,m,c.annualDay)),{cls:'ann',lbl:`年会費 ${fy(c.annualFee)}`});
  });
  (md.items||[]).forEach(it=>{
    if(it.day==null)return;
    const d=applyDayMode(y,m,it.day,it.dayMode||'prev');
    add(fmtD(d),{cls:it.amount>0?'inc':'io',lbl:`${it.label} ${fy(it.amount)}`});
  });

  const fd=new Date(y,m-1,1).getDay(),dim=new Date(y,m,0).getDate(),pd=new Date(y,m-1,0).getDate();
  let html='';
  for(let i=fd-1;i>=0;i--)html+=ccell(new Date(y,m-2,pd-i),true,ev);
  for(let d=1;d<=dim;d++)html+=ccell(new Date(y,m-1,d),false,ev);
  const rem=(7-((fd+dim)%7))%7;
  for(let i=1;i<=rem;i++)html+=ccell(new Date(y,m,i),true,ev);
  document.getElementById('cal-grid').innerHTML=html;
  renderCalPie(calYm);
}

function ccell(d,dim,ev){
  const ds=fmtD(d),dw=d.getDay(),hol=isHL(d),today=ds===todayStr();
  let cls='ccell';
  if(dim)cls+=' dim';if(today)cls+=' today';
  if(dw===0||hol)cls+=' csun';else if(dw===6)cls+=' csat';
  if(hol)cls+=' chol';
  const chips=(ev[ds]||[]).map(e=>`<div class="cchip ${e.cls}">${e.lbl}</div>`).join('');
  const holN=hol?`<div class="holnm">${hol}</div>`:'';
  return`<div class="${cls}"><div class="cday">${d.getDate()}</div>${holN}${chips}</div>`;
}

function renderCalPie(ymStr){
  const[,m]=ymStr.split('-').map(Number),md=getMD(ymStr);
  document.getElementById('cal-pie-title').textContent=`${ymLbl(ymStr)} カード別利用額`;
  const vis=S.cards.filter(c=>c.visible);
  const entries=vis.map((c,i)=>({
    name:c.name,
    amt:(md.cardAmounts[c.id]||0)+(c.annualFee>0&&c.annualMonth===m?c.annualFee:0),
    color:CARD_COLORS[i%CARD_COLORS.length]
  })).filter(e=>e.amt>0);
  const total=entries.reduce((s,e)=>s+e.amt,0);
  document.getElementById('cal-pie-total').textContent=fy(total);
  const ctx=document.getElementById('cal-pie-canvas').getContext('2d');
  if(_calCharts.pie){_calCharts.pie.destroy();}
  if(!entries.length){document.getElementById('cal-pie-legend').innerHTML='<div class="empty">データなし</div>';return;}
  _calCharts.pie=new Chart(ctx,{
    type:'doughnut',
    data:{labels:entries.map(e=>e.name),datasets:[{data:entries.map(e=>e.amt),backgroundColor:entries.map(e=>e.color),borderWidth:2,borderColor:'#161927',hoverOffset:5}]},
    options:{cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${fy(c.parsed)} (${Math.round(c.parsed/total*100)}%)`}}},animation:{duration:400}}
  });
  document.getElementById('cal-pie-legend').innerHTML=entries.slice(0,8).map(e=>
    `<div class="pie-leg-row"><div class="pie-leg-dot" style="background:${e.color}"></div><span class="pie-leg-name">${e.name}</span><span class="pie-leg-val">${fy(e.amt)}</span></div>`
  ).join('');
}

const _stCharts={};

function renderStats(){
  const yms=getDisplayYms();
  const body=document.getElementById('stats-body');
  const vis=S.cards.filter(c=>c.visible);

  // 各月の合計
  const totals=yms.map(y=>({ym:y,total:vis.reduce((s,c)=>{
    const md=getMD(y),[,mo]=y.split('-').map(Number);
    return s+(md.cardAmounts[c.id]||0)+(c.annualFee>0&&c.annualMonth===mo?c.annualFee:0);
  },0)}));

  body.innerHTML=`
    <div class="stat-card">
      <div class="stat-sec-title">今月 vs 来月 カード別利用額</div>
      <div style="display:flex;gap:10px;margin-bottom:12px">
        ${totals.map(t=>`<div style="flex:1;background:var(--s2);border-radius:10px;padding:10px 12px;border:1px solid var(--b1)">
          <div style="font-size:10px;color:var(--t2);margin-bottom:3px">${ymLbl(t.ym)}</div>
          <div style="font-family:var(--mono);font-size:16px;color:var(--ng)">${fy(t.total)}</div>
        </div>`).join('')}
      </div>
      <div style="overflow-x:auto"><canvas id="sc-stacked" height="240"></canvas></div>
    </div>
    <div class="stat-card">
      <div class="stat-sec-title">カード別内訳</div>
      <div id="stats-breakdown"></div>
    </div>`;

  requestAnimationFrame(()=>{
    if(_stCharts.stacked){_stCharts.stacked.destroy();}
    const ctx=document.getElementById('sc-stacked');if(!ctx)return;
    const labels=yms.map(y=>{const[,m]=y.split('-');return parseInt(m)+'月';});
    const datasets=vis.map((c,i)=>{
      const data=yms.map(y=>{
        const md=getMD(y),[,mo]=y.split('-').map(Number);
        return(md.cardAmounts[c.id]||0)+(c.annualFee>0&&c.annualMonth===mo?c.annualFee:0);
      });
      if(data.every(v=>v===0))return null;
      return{label:c.name,data,backgroundColor:CARD_COLORS[i%CARD_COLORS.length]+'dd',borderRadius:3,borderSkipped:false};
    }).filter(Boolean);
    _stCharts.stacked=new Chart(ctx,{
      type:'bar',
      data:{labels,datasets},
      options:{
        responsive:true,maintainAspectRatio:true,animation:{duration:350},
        scales:{
          x:{stacked:true,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#7a849f',font:{size:12,family:"'Noto Sans JP'"}}},
          y:{stacked:true,grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#7a849f',font:{size:11,family:"'DM Mono'"},callback:v=>Math.abs(v)>=10000?(v/10000).toFixed(0)+'万':fy(v)}}
        },
        plugins:{
          legend:{display:true,position:'bottom',labels:{color:'#7a849f',font:{size:10,family:"'Noto Sans JP'"},boxWidth:10,boxHeight:10,padding:8}},
          tooltip:{backgroundColor:'rgba(18,21,34,0.95)',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#dde2f2',bodyColor:'#dde2f2',padding:9,callbacks:{label:c=>` ${c.dataset.label}: ${fy(c.parsed.y)}`}}
        }
      }
    });

    // breakdown table
    const bkEl=document.getElementById('stats-breakdown');
    if(!bkEl)return;
    const rows=vis.map((c,i)=>{
      const amts=yms.map(y=>{
        const md=getMD(y),[,mo]=y.split('-').map(Number);
        return(md.cardAmounts[c.id]||0)+(c.annualFee>0&&c.annualMonth===mo?c.annualFee:0);
      });
      if(amts.every(v=>v===0))return'';
      return`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
        <div style="width:8px;height:8px;border-radius:2px;background:${CARD_COLORS[i%CARD_COLORS.length]};flex-shrink:0"></div>
        <span style="flex:1;font-size:13px">${c.name}</span>
        ${amts.map(v=>`<span style="font-family:var(--mono);font-size:13px;color:${v>0?'var(--ng)':'var(--t3)'};min-width:72px;text-align:right">${v>0?fy(v):'—'}</span>`).join('')}
      </div>`;
    }).join('');
    bkEl.innerHTML=rows||'<div class="empty">データなし</div>';
  });
}

let expandedCardId=null;

function renderCards(){
  const body=document.getElementById('cards-body');
  if(!S.cards.length){
    body.innerHTML=`<button class="wallet-add-btn" onclick="openModal('addCard')">＋ カードを追加</button><div class="empty">カードが登録されていません</div>`;

  }
  const topBar=`<div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button class="edit-mode-btn" onclick="openModal('addCard')">＋ カードを追加</button>
  </div>`;

  const cards=S.cards.map((c)=>{
    const grad=CARD_GRADIENTS[c.gradientIdx||0];
    const isExp=expandedCardId===c.id;

    const detail=isExp?`<div class="wallet-card-detail">
      ${(c.phones||[]).map(p=>`<div class="wallet-card-detail-row">
        <span class="wallet-card-detail-lbl">${p.label}</span>
        <div class="wallet-card-detail-val">
          <span>${p.number}</span>
          <button class="copy-btn" onclick="copyText(event,'${p.number}')">コピー</button>
        </div>
      </div>`).join('')}
      ${c.note?`<div class="wallet-card-detail-row">
        <span class="wallet-card-detail-lbl">備考</span>
        <div class="wallet-card-detail-val" style="font-family:var(--sans);font-size:13px">${c.note}</div>
      </div>`:''}
      <div class="wallet-card-detail-row">

        <div class="wallet-card-detail-val">${c.closeDay===99?'末日':c.closeDay+'日'} / ${c.billDay}日</div>
      </div>
      ${c.annualFee?`<div class="wallet-card-detail-row">
        <span class="wallet-card-detail-lbl">年会費</span>
        <div class="wallet-card-detail-val">${fy(c.annualFee)}（${c.annualMonth}月請求）</div>

        <button class="btn btn-g btn-sm" onclick="openModal('addCard',${c.id})">編集</button>

        <button class="btn btn-g btn-sm" onclick="toggleCardVis(${c.id})">${c.visible?'ダッシュ非表示':'ダッシュ表示'}</button>
      </div>
    </div>`:'';

    return`<div class="wallet-card${isExp?' expanded':''}${!c.visible?' wallet-vis-off':''}"
        style="background:${grad}"
        onclick="toggleWalletCard(${c.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div class="wallet-card-name">${c.name}</div>
          ${!c.visible?`<div style="font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px">ダッシュボード非表示</div>`:''}
        </div>
        <div class="wallet-card-brand" style="flex-shrink:0;margin-left:8px">${brandIcon(c.brand)}</div>
      </div>
      <div style="margin-top:12px;display:flex;gap:16px">
        <div><div style="font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:.6px;text-transform:uppercase">締め日</div>
          <div style="font-family:var(--mono);font-size:13px;color:rgba(255,255,255,0.85)">${c.closeDay===99?'末日':c.closeDay+'日'}</div></div>
        <div><div style="font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:.6px;text-transform:uppercase">引落日</div>
          <div style="font-family:var(--mono);font-size:13px;color:rgba(255,255,255,0.85)">${c.billDay}日</div></div>
        ${c.annualFee?`<div><div style="font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:.6px;text-transform:uppercase">年会費</div>
          <div style="font-family:var(--mono);font-size:13px;color:rgba(255,255,255,0.85)">${fy(c.annualFee)}</div></div>`:''}
      </div>
      ${detail}
    </div>`;
  }).join('');

  body.innerHTML=topBar+`<div class="wallet-wrap">${cards}</div><div style="height:24px"></div>`;
}

function toggleWalletCard(id){
  expandedCardId=(expandedCardId===id?null:id);
  renderCards();
}
function toggleCardVis(id){const c=S.cards.find(x=>x.id===id);if(c){c.visible=!c.visible;save();renderCards();}}
function delCard(id){
  if(!confirm('削除しますか？'))return;
  S.cards=S.cards.filter(c=>c.id!==id);save();renderCards();
}
function copyText(e,text){
  e.stopPropagation();
  navigator.clipboard?.writeText(text).then(()=>{
    const btn=e.target;const orig=btn.textContent;
    btn.textContent='✓';setTimeout(()=>btn.textContent=orig,1200);
  });
}

function renderSettings(){
  const lastBk=S.lastBackup;
  let backupSub='最終バックアップ：未取得',showReminder=!lastBk;
  if(lastBk){
    const days=Math.floor((Date.now()-lastBk)/864e5);
    backupSub=`最終バックアップ：${days===0?'今日':days+'日前'}${S.backupCreatedAt?' ('+S.backupCreatedAt+')':''}`;
    if(days>=7)showReminder=true;
  }
  const order=S.tabOrder||TAB_DEFS.map(t=>t.id);
  if(!order.includes('cards'))order.push('cards');
  const defs=order.map(id=>TAB_DEFS.find(t=>t.id===id)).filter(Boolean);
  TAB_DEFS.forEach(t=>{if(!defs.find(d=>d.id===t.id))defs.push(t);});
  const hidden=S.tabHidden||[];

  document.getElementById('settings-body').innerHTML=`
    ${showReminder?`<div class="backup-banner">⚠ ${!lastBk?'バックアップが未取得です':'前回バックアップから'+Math.floor((Date.now()-lastBk)/864e5)+'日経過'}
      <button onclick="doExport()" style="background:rgba(240,156,42,0.2);border:1px solid rgba(240,156,42,0.4);border-radius:6px;color:var(--warn);cursor:pointer;font-size:12px;font-weight:700;padding:4px 9px">今すぐ</button>
    </div>`:''}

    <div class="st-sec"><div class="st-sec-title">データ管理</div>
      <div class="st-row" onclick="doExport()">
        <span class="st-icon">↓</span>
        <div class="st-body"><div class="st-lbl">バックアップをダウンロード</div><div class="st-sub">${backupSub}</div></div>
        <span class="st-arr">›</span>
      </div>
      <div class="st-row" onclick="document.getElementById('st-file').click()">
        <span class="st-icon">↑</span>
        <div class="st-body"><div class="st-lbl">バックアップから復元</div><div class="st-sub">JSONファイルを選択</div></div>
        <span class="st-arr">›</span>
      </div>
      <input type="file" id="st-file" accept=".json" style="display:none" onchange="doImport(event)">
      <div class="st-row" style="border-color:rgba(232,80,106,0.2)" onclick="confirmReset()">
        <span class="st-icon" style="color:var(--ng)">×</span>
        <div class="st-body"><div class="st-lbl" style="color:var(--ng)">全データを削除</div><div class="st-sub">カード・月次データをすべて消去</div></div>
        <span class="st-arr">›</span>
      </div>
    </div>

    <div class="st-sec"><div class="st-sec-title">タブの並び順 / 表示</div>
      <div class="st-hint">ドラッグで並び替え（ダッシュボードは固定）</div>
      <div id="st-tab-list">
        ${defs.filter(t=>t.id!=='settings').map(t=>{
          const isHidden=hidden.includes(t.id)&&!t.fixed;
          return`<div class="tab-order-item${isHidden?' hidden-tab':''}" draggable="${!t.fixed}" data-tab-id="${t.id}"
            ondragstart="tabDragStart(event,'${t.id}')" ondragover="tabDragOver(event)" ondrop="tabDrop(event,'${t.id}')">
            <span class="tab-order-handle">${t.fixed?'●':'⠿'}</span>
            <span class="tab-order-icon">${t.icon}</span>
            <span class="tab-order-name">${t.label}</span>
            ${t.fixed
              ?'<span style="font-size:11px;color:var(--t3)">固定</span>'
              :`<button class="vis-toggle-btn${isHidden?'':' on'}" onclick="toggleTabHidden('${t.id}')">${isHidden?'非表示':'表示中'}</button>`
            }
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="st-sec"><div class="st-sec-title">作者</div>
      <div class="author-banner" onclick="window.open('https://x.com/_4cls','_blank')">
        <div class="author-banner-name">CardBoard</div>
        <div class="author-banner-x">𝕏 @_4cls</div>
      </div>
    </div>`;
}

let _dragTabId=null;
function tabDragStart(e,id){_dragTabId=id;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dragging');}
function tabDragOver(e){e.preventDefault();document.querySelectorAll('.tab-order-item').forEach(el=>el.classList.remove('drag-over'));e.currentTarget.classList.add('drag-over');}
function tabDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.tab-order-item').forEach(el=>el.classList.remove('dragging','drag-over'));
  if(!_dragTabId||_dragTabId===targetId)return;
  const srcDef=TAB_DEFS.find(t=>t.id===_dragTabId),tgtDef=TAB_DEFS.find(t=>t.id===targetId);
  if(srcDef?.fixed||tgtDef?.fixed)return;
  const order=S.tabOrder||TAB_DEFS.map(t=>t.id);
  const si=order.indexOf(_dragTabId),ti=order.indexOf(targetId);
  if(si<0||ti<0)return;
  order.splice(si,1);order.splice(ti,0,_dragTabId);
  S.tabOrder=order;save();buildTabs();renderSettings();
}
function toggleTabHidden(id){
  if(!S.tabHidden)S.tabHidden=[];
  const idx=S.tabHidden.indexOf(id);
  if(idx>=0)S.tabHidden.splice(idx,1);else S.tabHidden.push(id);
  if(S.tabHidden.includes(activeTab))goTab('dash');
  save();buildTabs();renderSettings();
}

function checkBackupReminder(){
  const el=document.getElementById('dash-backup-reminder');if(!el)return;
  if(!S.lastBackup||Math.floor((Date.now()-S.lastBackup)/864e5)<7){el.innerHTML='';return;}
  const days=Math.floor((Date.now()-S.lastBackup)/864e5);
  el.innerHTML=`<div class="backup-banner">⚠ 前回バックアップから <strong>${days}日</strong> 経過<button onclick="doExport()" style="background:rgba(240,156,42,0.2);border:1px solid rgba(240,156,42,0.4);border-radius:6px;color:var(--warn);cursor:pointer;font-size:12px;font-weight:700;padding:4px 9px">今すぐ</button></div>`;
}
function doExport(){
  const now=new Date();
  const ds=`${now.getFullYear()}${z2(now.getMonth()+1)}${z2(now.getDate())}_${z2(now.getHours())}${z2(now.getMinutes())}`;
  S.backupCreatedAt=`${now.getFullYear()}/${z2(now.getMonth()+1)}/${z2(now.getDate())} ${z2(now.getHours())}:${z2(now.getMinutes())}`;
  S.lastBackup=Date.now();save();
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`cardboard_backup_${ds}.json`;a.click();
  URL.revokeObjectURL(url);renderSettings();alert('バックアップを保存しました。');
}
function doImport(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.cards)throw new Error('invalid');
      if(!confirm('現在のデータをすべて上書きして復元しますか？'))return;
      S=data;save();buildTabs();renderDash();renderSettings();alert('復元しました。');
    }catch(err){alert('ファイルが正しくありません。');}
  };
  reader.readAsText(file);event.target.value='';
}
function confirmReset(){
  mOpen('全データを削除',
    `<div style="font-size:14px;line-height:1.9;color:var(--t2)">すべてのデータが削除されます。<br>この操作は取り消せません。<br><br><span style="color:var(--warn)">先にバックアップを取ることをおすすめします。</span></div>`,
    `<button class="btn btn-g" onclick="mClose()">キャンセル</button>
     <button class="btn btn-g" style="color:var(--warn);border-color:rgba(240,156,42,0.3)" onclick="doExport();mClose();setTimeout(doReset,800)">バックアップして削除</button>
     <button class="btn" style="background:var(--ng);color:#fff" onclick="doReset()">そのまま削除</button>`);
}
function doReset(){
  Object.assign(S,{months:{},cards:[],nxtItem:1,nxtCard:1,firstLaunch:true});
  save();mClose();renderDash();renderSettings();
}

let _mYm='';
function mOpen(t,b,a){
  document.getElementById('m-title').textContent=t;
  document.getElementById('m-body').innerHTML=b;
  document.getElementById('m-act').innerHTML=a;
  document.getElementById('ov').classList.add('on');
}
function mClose(){document.getElementById('ov').classList.remove('on');}
function ovClose(e){if(e.target===document.getElementById('ov'))mClose();}

function openModal(type,arg){
  _mYm=typeof arg==='string'?arg:'';
  if(type==='addFixed')    bAddItem(true);
  else if(type==='addOther')  bAddItem(false);
  else if(type==='addCard'){
    const card=typeof arg==='number'?S.cards.find(c=>c.id===arg):null;
    bCardForm(card);
  }
  document.getElementById('ov').classList.add('on');
}

function bAddItem(isFixed){
  mOpen(isFixed?'固定項目を追加':'当月項目を追加',
    `<div class="frow"><label class="flbl">項目名<span class="req">*必須</span></label>
     <input class="finput" id="mi_l" placeholder="${isFixed?'例: 積立NISA':'例: 旅行費用'}"></div>
     <div class="frow"><label class="flbl">金額（支出はマイナス）<span class="req">*必須</span></label>
     <input class="finput" id="mi_a" type="text" inputmode="numeric" placeholder="-100,000"
       oninput="this.value=fmtAmtInput(this.value)"
       onkeydown="if(event.key==='Enter')_saveItem(${isFixed})"></div>
     <div class="fgrid">
       <div class="frow"><label class="flbl">カレンダー表示日（空=非表示）</label>
       <input class="finput" id="mi_d" type="date"></div>
       <div class="frow"><label class="flbl">日付計算</label>
       <select class="finput" id="mi_dm">
         <option value="prev">前営業日</option>
         <option value="next">後営業日</option>
         <option value="exact">当日</option>
       </select></div>
     </div>`,
    `<button class="btn btn-g" onclick="mClose()">キャンセル</button>
     <button class="btn btn-p" onclick="_saveItem(${isFixed})">追加</button>`);
  setTimeout(()=>document.getElementById('mi_l')?.focus(),100);
}
function _saveItem(isFixed){
  const l=document.getElementById('mi_l').value.trim();
  const a=parseAmt(document.getElementById('mi_a').value);
  const dv=document.getElementById('mi_d').value;
  const day=dv?parseInt(dv.split('-')[2]):null;
  const dayMode=document.getElementById('mi_dm').value;
  if(!l||isNaN(a)){alert('項目名と金額を入力してください');return;}
  const md=getMD(_mYm);if(!md.items)md.items=[];
  const maxOrder=md.items.reduce((m,it)=>Math.max(m,it.order||0),-1);
  md.items.push({id:S.nxtItem++,label:l,amount:a,checked:false,isFixed,order:maxOrder+1,day,dayMode});
  save();mClose();renderDash();
}

function _saveCard(id){
  const n=document.getElementById('fc_n').value.trim();
  const cl=parseInt(toHalf(document.getElementById('fc_cl').value));
  const bl=parseInt(toHalf(document.getElementById('fc_bl').value));
  const af=parseFloat(document.getElementById('fc_af').value)||0;
  const am=parseInt(document.getElementById('fc_am').value)||0;
  const ad=parseInt(document.getElementById('fc_ad').value)||0;
  const nt=document.getElementById('fc_nt').value.trim();

  const phones=[];
  let pi=0;
  while(document.getElementById(`ph_l_${pi}`)){
    const lbl=document.getElementById(`ph_l_${pi}`).value.trim();
    const num=document.getElementById(`ph_n_${pi}`).value.trim();
    if(lbl||num)phones.push({label:lbl,number:num});
    pi++;
  }

  if(!n||isNaN(cl)||isNaN(bl)){alert('カード名・締め日・引き落とし日は必須です');return;}

  const obj={name:n,brand:_cardBrand,closeDay:cl,billDay:bl,annualFee:af,annualMonth:am,annualDay:ad,note:nt,phones,gradientIdx:_gradIdx,visible:true};
  if(id){
    const c=S.cards.find(c=>c.id===id);
    if(c){const vis=c.visible;Object.assign(c,obj);c.visible=vis;}
  }else{
    S.cards.push({id:S.nxtCard++,...obj});
  }
  save();mClose();renderCards();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
buildTabs();
checkBackupReminder();
renderDash();

</script>
