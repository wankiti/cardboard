<style>
:root {
  --bg:#0d0f18;--s1:#161927;--s2:#1c2030;--s3:#232740;
  --b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.14);
  --accent:#5b8dee;--a2:#7c5cfc;
  --ok:#27c485;--ng:#e8506a;--warn:#f09c2a;
  --text:#dde2f2;--t2:#7a849f;--t3:#3a4058;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
  --tbh:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
*{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.12) transparent;}

/* ── Topbar ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:calc(46px + var(--st));padding-top:var(--st);display:flex;align-items:center;justify-content:space-between;padding-left:calc(16px + var(--sl));padding-right:calc(16px + var(--sr));background:rgba(13,15,24,0.9);backdrop-filter:saturate(180%) blur(28px);-webkit-backdrop-filter:saturate(180%) blur(28px);border-bottom:1px solid var(--b1);}
.topbar-logo{font-size:17px;font-weight:700;letter-spacing:.2px;}
.topbar-logo em{color:var(--accent);font-style:normal;}
.icon-btn{background:rgba(255,255,255,0.07);border:1px solid var(--b1);border-radius:8px;color:var(--t2);cursor:pointer;font-size:16px;padding:5px 10px;line-height:1;transition:.15s;font-family:var(--sans);}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── Pages ── */
.pages{position:fixed;top:calc(46px + var(--st));bottom:calc(var(--tbh) + var(--sb));left:0;right:0;overflow:hidden;}
.page{display:none;height:100%;overflow-y:auto;padding:14px calc(14px + var(--sr)) 14px calc(14px + var(--sl));-webkit-overflow-scrolling:touch;}
.page.on{display:block;}

/* ── Bottom tabs ── */
.btabs{position:fixed;bottom:0;left:0;right:0;z-index:200;height:calc(var(--tbh) + var(--sb));padding-bottom:var(--sb);padding-left:var(--sl);padding-right:var(--sr);display:flex;align-items:stretch;background:rgba(13,15,24,0.9);backdrop-filter:saturate(180%) blur(28px);-webkit-backdrop-filter:saturate(180%) blur(28px);border-top:1px solid var(--b1);}
.btab{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--t2);font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.2px;padding:6px 4px;transition:color .18s;}
.btab.on{color:var(--accent);}
.btab-icon{width:26px;height:24px;display:flex;align-items:center;justify-content:center;}

/* ── PC Sidebar ── */
.sidebar{display:none;}
@media(min-width:768px){
  body{overflow:auto!important;}
  .topbar{left:250px;height:50px;padding-top:0;padding-left:24px;padding-right:24px;}
  .topbar-logo{font-size:18px;}
  .btabs{display:none!important;}
  .pages{top:50px!important;bottom:0!important;left:250px!important;right:0!important;}
  .page{max-width:1120px;margin:0 auto;}
  .hero-val{font-size:40px!important;}
  .sidebar{display:flex!important;flex-direction:column;position:fixed;top:0;left:0;bottom:0;width:250px;background:rgba(13,15,24,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--b1);padding:22px 14px;z-index:300;}
  .sidebar-logo{font-size:18px;font-weight:700;padding:8px 10px 22px;letter-spacing:.2px;}
  .sidebar-logo em{color:var(--accent);font-style:normal;}
  .sidebar-btn{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--t2);padding:10px 12px;border-radius:10px;margin-bottom:3px;transition:.15s;text-align:left;width:100%;}
  .sidebar-btn:hover{background:rgba(255,255,255,0.05);color:var(--text);}
  .sidebar-btn.on{color:var(--accent);}
  .sidebar-btn-icon{font-size:17px;width:24px;text-align:center;display:flex;align-items:center;justify-content:center;}
  .sidebar-settings{margin-top:auto;}
  #dash-body{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  #dash-body .sec{display:flex;flex-direction:column;margin-bottom:0;}
  #dash-body .sec .sec-head{margin-bottom:7px;}
  #dash-body .sec .gb{display:flex;flex-direction:column;}
  #dash-body .sec .sec-footer-outer{background:var(--s2);border:1px solid var(--b1);border-top:none;border-radius:0 0 14px 14px;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
  .topbar-settings-btn{display:none!important;}
}

/* ── Month switcher ── */
.month-sw{display:flex;gap:3px;background:var(--s2);border-radius:11px;padding:3px;margin-bottom:13px;border:1px solid var(--b1);}
.msw-btn{flex:1;background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--t2);padding:9px 6px;border-radius:8px;transition:.18s;text-align:center;}
.msw-btn.on{background:var(--s3);color:var(--accent);box-shadow:0 1px 6px #0005;}

/* ── Hero ── */
.hero{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:18px;margin-bottom:13px;}
.hero-lbl{font-size:13px;color:var(--t2);letter-spacing:.4px;margin-bottom:5px;}
.hero-val{font-family:var(--mono);font-size:32px;font-weight:500;letter-spacing:-1px;line-height:1;}
.hero-val.ok{color:var(--ok);}
.hero-val.warn{color:var(--warn);}
.hero-val.ng{color:var(--ng);}
.hero-sub{font-size:12px;color:var(--t2);margin-top:5px;}
.hero-pills{display:flex;gap:8px;margin-top:13px;padding-top:13px;border-top:1px solid var(--b1);}
.hero-pill{flex:1;background:var(--s2);border-radius:10px;padding:10px 12px;border:1px solid var(--b1);}
.hero-pill-lbl{font-size:10px;color:var(--t2);margin-bottom:3px;letter-spacing:.3px;}
.hero-pill-val{font-family:var(--mono);font-size:14px;font-weight:500;}
.hero-pill-val.pos{color:var(--ok);}
.hero-pill-val.neg{color:var(--ng);}

/* ── Section ── */
.sec{margin-bottom:13px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;min-height:30px;}
.sec-title{font-size:12px;font-weight:700;color:var(--t2);letter-spacing:.6px;text-transform:uppercase;}
.sec-footer-outer{background:var(--s2);border:1px solid var(--b1);border-top:none;border-radius:0 0 14px 14px;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
.gb{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
.gb.no-bottom-radius{border-radius:14px 14px 0 0;border-bottom:none;}
.sec-divider{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:6px 13px 4px;background:var(--s2);border-bottom:1px solid rgba(255,255,255,0.04);}

/* ── Row ── */
.row{display:flex;align-items:center;gap:8px;padding:11px 13px;border-bottom:1px solid rgba(255,255,255,0.04);transition:background .1s;}
.row:last-child{border-bottom:none;}
.row-drag{cursor:grab;color:var(--t3);font-size:14px;flex-shrink:0;}
.row-lbl{flex:1;font-size:14px;}
.row-lbl.done{color:var(--t2);text-decoration:line-through;}
.row-val{font-family:var(--mono);font-size:14px;}
.row-val.pos{color:var(--ok);}
.row-val.neg{color:var(--ng);}
.row-val.zero{color:var(--t3);}
.row-edit-btn{background:none;border:1px solid var(--b2);border-radius:6px;color:var(--t2);cursor:pointer;font-size:12px;padding:3px 8px;flex-shrink:0;transition:.15s;}
.row-edit-btn:hover{border-color:var(--accent);color:var(--accent);}
.chk{width:21px;height:21px;border-radius:6px;border:1.5px solid var(--b2);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.15s;}
.chk.on{background:var(--ok);border-color:var(--ok);color:#fff;}
.rdel{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:0 2px;flex-shrink:0;}
@media(hover:hover){.rdel:hover{color:var(--ng);}}
.add-strip{display:flex;gap:6px;padding:9px 13px;border-top:1px solid rgba(255,255,255,0.04);}
.add-pill{background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.1);border-radius:7px;color:var(--t2);cursor:pointer;font-family:var(--sans);font-size:12px;padding:7px 11px;transition:.15s;}
.add-pill:hover{border-color:var(--accent);color:var(--accent);}
.req{color:var(--ng);font-size:10px;margin-left:2px;}

/* ── Edit mode toggle ── */
.edit-mode-btn{background:none;border:1px solid var(--b2);border-radius:7px;color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:600;padding:4px 10px;transition:.15s;}
.edit-mode-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(91,141,238,0.1);}

/* ── Card accordion ── */
.cacc-head{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);transition:background .1s;}
.cacc-name{flex:1;font-size:14px;font-weight:500;}
.cacc-name.past{color:var(--t3);}
.cacc-date{font-size:11px;color:var(--t2);font-family:var(--mono);white-space:nowrap;min-width:52px;text-align:center;}
.cacc-date.past{color:var(--t3);}
.cacc-date.soon{color:var(--warn);}
.cacc-date.tod{color:var(--ng);font-weight:700;}
.cacc-amt{font-family:var(--mono);font-size:14px;min-width:70px;text-align:right;}
.cacc-amt.zero{color:var(--t3);}
.cacc-amt.past{color:var(--t3);}
.cacc-chev{font-size:11px;color:var(--t2);transition:transform .2s;flex-shrink:0;}
.cacc-chev.open{transform:rotate(180deg);}
.cacc-body{display:none;padding:10px 13px 13px;background:rgba(0,0,0,0.18);border-bottom:1px solid rgba(255,255,255,0.04);}
.cacc-body.open{display:block;}
.cacc-meta{font-size:12px;color:var(--t2);margin-bottom:9px;line-height:1.9;}
.cacc-months{display:flex;flex-direction:column;gap:7px;}
.cacc-month-row{display:flex;align-items:center;gap:7px;}
.cacc-month-lbl{font-size:11px;color:var(--t2);width:48px;flex-shrink:0;}
.cacc-input{flex:1;background:var(--bg);border:1px solid var(--b2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:15px;padding:8px 10px;outline:none;transition:.15s;-webkit-appearance:none;text-align:right;}
.cacc-input:focus{border-color:var(--accent);}
.cacc-save{background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:700;padding:8px 13px;transition:.15s;white-space:nowrap;}
.cacc-save:hover{opacity:.85;}
.ann-badge{font-size:10px;background:rgba(240,156,42,0.15);color:var(--warn);border:1px solid rgba(240,156,42,0.25);border-radius:4px;padding:1px 5px;flex-shrink:0;}

/* ── Banners ── */
.tutorial-banner{background:linear-gradient(135deg,rgba(91,141,238,0.15),rgba(124,92,252,0.15));border:1px solid rgba(91,141,238,0.3);border-radius:12px;padding:13px 14px;margin-bottom:13px;}
#tutorial-float{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 70px);left:50%;transform:translateX(-50%);width:min(480px,calc(100vw - 28px));z-index:200;pointer-events:none;}
#tutorial-float .tutorial-banner{pointer-events:all;margin-bottom:0;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
@media(min-width:768px){#tutorial-float{left:calc(220px + (100vw - 220px)/2);bottom:24px;}}
.tutorial-banner-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.tutorial-banner-body{font-size:12px;color:var(--t2);line-height:1.8;}
.backup-banner{background:rgba(240,156,42,0.12);border:1px solid rgba(240,156,42,0.3);border-radius:10px;padding:9px 13px;margin-bottom:11px;font-size:12px;color:var(--warn);display:flex;align-items:center;justify-content:space-between;gap:8px;}

/* ── Calendar ── */
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
.cal-nav h2{font-size:16px;font-weight:700;flex:1;text-align:center;}
.cal-nav-btn{background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t2);cursor:pointer;font-size:18px;padding:5px 12px;line-height:1;transition:.15s;}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.cal-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:13px;}
/* PC: 7列グリッド */
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--s2);border-bottom:1px solid var(--b1);}
.cal-dow{padding:7px 2px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--t2);}
.cal-dow.sun{color:#ff7088;}
.cal-dow.sat{color:var(--accent);}
.cal-grid-pc{display:grid;grid-template-columns:repeat(7,1fr);}
.ccell{border-right:1px solid rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.04);min-height:72px;padding:4px 3px;overflow:hidden;}
.ccell:nth-child(7n){border-right:none;}
.ccell.dim{opacity:.22;}
.ccell.today{background:rgba(91,141,238,0.08);box-shadow:inset 0 0 0 1.5px rgba(91,141,238,0.35);}
.cday{font-size:12px;font-weight:700;font-family:var(--mono);margin-bottom:2px;line-height:1.4;}
.cday-today{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;}
.ccell.csun .cday,.ccell.chol .cday{color:#ff7088;}
.ccell.csat .cday{color:var(--accent);}
.cchip{font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:1px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}
.cchip.bill{background:rgba(232,80,106,0.18);color:#ff8098;border-left:2px solid var(--ng);}
.cchip.inc{background:rgba(39,196,133,0.15);color:#52e0a4;border-left:2px solid var(--ok);}
.cchip.io{background:rgba(124,92,252,0.15);color:#b8a4ff;border-left:2px solid var(--a2);}
.cchip.ann{background:rgba(240,156,42,0.15);color:#ffc060;border-left:2px solid var(--warn);}
/* SP: 縦リスト */
.cal-list{display:flex;flex-direction:column;}
.cal-week-sep{background:var(--s2);padding:4px 13px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.6px;border-bottom:1px solid var(--b1);}
.cal-row{display:grid;grid-template-columns:48px 1fr;border-bottom:1px solid rgba(255,255,255,0.04);min-height:40px;}
.cal-row:last-child{border-bottom:none;}
.cal-row.today{background:rgba(91,141,238,0.07);}
.cal-date-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border-right:1px solid rgba(255,255,255,0.05);}
.cal-date-num{font-family:var(--mono);font-size:15px;font-weight:700;line-height:1;}
.cal-date-num.today-circle{background:var(--accent);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.cal-date-dow{font-size:9px;font-weight:600;color:var(--t3);margin-top:2px;}
.cal-row.sun .cal-date-num,.cal-row.hol .cal-date-num{color:#ff7088;}
.cal-row.sat .cal-date-num{color:var(--accent);}
.cal-row.sun .cal-date-dow{color:#ff7088;}
.cal-row.sat .cal-date-dow{color:var(--accent);}
.cal-events-col{padding:5px 10px;display:flex;flex-direction:column;gap:2px;justify-content:center;}
.cal-event{font-size:11px;border-radius:4px;padding:2px 6px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.cal-event.bill{background:rgba(232,80,106,0.15);color:#ff8098;border-left:2px solid var(--ng);}
.cal-event.inc{background:rgba(39,196,133,0.13);color:#52e0a4;border-left:2px solid var(--ok);}
.cal-event.io{background:rgba(124,92,252,0.13);color:#b8a4ff;border-left:2px solid var(--a2);}
.cal-event.ann{background:rgba(240,156,42,0.13);color:#ffc060;border-left:2px solid var(--warn);}
.cal-event-lbl{font-size:10px;opacity:.8;font-family:var(--sans);font-weight:500;}
.cal-event-amt{font-family:var(--mono);}
/* PC: リスト非表示、グリッド表示 */
@media(min-width:768px){
  .cal-list{display:none;}
  .cal-grid-pc{display:grid;}
  .cal-dow-row{display:grid;}
}
/* SP: グリッド非表示、リスト表示 */
@media(max-width:767px){
  .cal-dow-row{display:none;}
  .cal-grid-pc{display:none;}
  .cal-list{display:flex;}
}
.cal-legend{display:flex;gap:9px;padding:8px 13px;border-top:1px solid var(--b1);flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--t2);}
.leg-dot{width:7px;height:7px;border-radius:2px;}
.cal-pie-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:13px;}
.cal-pie-title{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;}
.cal-pie-inner{display:flex;gap:12px;align-items:center;}
.cal-pie-canvas-wrap{position:relative;width:130px;height:130px;flex-shrink:0;}
.cal-pie-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.cal-pie-center-lbl{font-size:10px;color:var(--t2);}
.cal-pie-center-val{font-family:var(--mono);font-size:14px;font-weight:500;}
.pie-leg-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;overflow:hidden;}
.pie-leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.pie-leg-name{font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pie-leg-val{font-family:var(--mono);font-size:11px;color:var(--t2);flex-shrink:0;}


/* ── Wallet タイル ── */
.wallet-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.wallet-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--s2);border:1.5px dashed var(--b2);border-radius:14px;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;padding:0;min-height:80px;transition:.15s;width:100%;}
.wallet-add-btn:hover{border-color:var(--accent);color:var(--accent);}
@media(min-width:768px){
  .wallet-wrap{grid-template-columns:repeat(3,1fr);gap:14px;}
}
/* タイルカード: 名前＋ブランドのみ、縦横比固定 */
.wallet-tile{
  position:relative;
  border-radius:12px;
  padding:12px;
  aspect-ratio:85.6/54;
  cursor:pointer;
  user-select:none;
  overflow:hidden;
  border:1.5px solid rgba(255,255,255,0.15);
  box-shadow:0 3px 12px rgba(0,0,0,0.3);
  transition:transform .15s,box-shadow .15s;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.wallet-tile:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.wallet-tile-name{font-size:14px;font-weight:700;color:rgba(255,255,255,0.95);line-height:1.3;word-break:break-word;}
.wallet-tile-brand{display:flex;justify-content:flex-end;}
/* 全面詳細オーバーレイ */
.card-detail-overlay{
  display:none;position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  align-items:center;justify-content:center;
  padding:20px;
}
.card-detail-overlay.on{display:flex;}
.card-detail-panel{
  width:100%;max-width:420px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,0.7);
}
.card-detail-hero{
  padding:20px 20px 16px;
  aspect-ratio:85.6/54;
  display:flex;flex-direction:column;justify-content:space-between;
  position:relative;
}
.card-detail-body{
  background:var(--s2);
  padding:14px 16px;
}
.card-detail-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:13px;}
.card-detail-row:last-child{border-bottom:none;}
.card-detail-lbl{color:var(--t2);}
.card-detail-val{font-family:var(--mono);color:var(--text);display:flex;align-items:center;gap:6px;}
.card-detail-actions{display:flex;gap:8px;padding:12px 16px;background:var(--s2);border-top:1px solid var(--b1);}
.card-detail-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.4);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;color:rgba(255,255,255,0.7);font-size:16px;display:flex;align-items:center;justify-content:center;line-height:1;}

/* Brand SVGs */
.brand-icon svg{display:block;}

/* ── Settings ── */
.st-wrap{padding-bottom:8px;}
.st-sec{margin-bottom:18px;}
.st-sec-title{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;}
.st-row{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:.15s;}
.st-row:hover{border-color:var(--b2);}
.st-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center;font-family:var(--sans);}
.st-body{flex:1;}
.st-lbl{font-size:13px;font-weight:500;}
.st-sub{font-size:11px;color:var(--t2);margin-top:2px;}
.st-arr{color:var(--t2);font-size:16px;}
.st-hint{font-size:12px;color:var(--t3);margin-bottom:7px;}
.tab-order-item{display:flex;align-items:center;gap:9px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:11px 13px;margin-bottom:7px;user-select:none;transition:.15s;}
.tab-order-item.dragging{opacity:.4;border-color:var(--accent);}
.tab-order-item.drag-over{border-color:var(--accent);background:var(--s3);}
.tab-order-item.hidden-tab{opacity:.45;}
.tab-order-handle{color:var(--t2);font-size:14px;flex-shrink:0;}
.tab-order-icon{font-size:17px;flex-shrink:0;width:24px;text-align:center;display:flex;align-items:center;justify-content:center;}
.tab-order-name{flex:1;font-size:14px;font-weight:500;}
.vis-toggle-btn{background:rgba(255,255,255,0.06);border:1px solid var(--b1);border-radius:14px;color:var(--t2);cursor:pointer;font-size:11px;font-weight:700;padding:3px 10px;white-space:nowrap;transition:.15s;}
.vis-toggle-btn.on{background:rgba(91,141,238,0.15);border-color:rgba(91,141,238,0.3);color:var(--accent);}
.author-banner{background:linear-gradient(135deg,rgba(91,141,238,0.1),rgba(124,92,252,0.1));border:1px solid rgba(91,141,238,0.2);border-radius:12px;padding:15px;text-align:center;margin-bottom:7px;cursor:pointer;transition:.15s;}
.author-banner:hover{border-color:rgba(91,141,238,0.4);}
.author-banner-name{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:3px;}
.author-banner-x{font-size:13px;color:var(--t2);}

/* ── Modal ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.ov.on{display:flex;}
@media(min-width:500px){.ov{align-items:center;}}
.modal{background:rgba(18,21,34,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:20px;width:100%;max-width:520px;max-height:calc(100vh - 32px);overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.14);border-radius:2px;margin:12px auto 16px;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:15px;}
.frow{margin-bottom:12px;}
.flbl{display:block;font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.finput{width:100%;background:rgba(13,15,24,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:var(--text);font-family:var(--sans);font-size:15px;padding:11px 12px;outline:none;transition:.15s;-webkit-appearance:none;}
.finput:focus{border-color:var(--accent);}
.finput.req-field{border-color:rgba(232,80,106,0.4);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.mact{display:flex;justify-content:flex-end;gap:8px;margin-top:15px;flex-wrap:wrap;}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:700;padding:11px 18px;transition:.15s;}
.btn-p{background:var(--accent);color:#fff;}
.btn-g{background:rgba(255,255,255,0.07);color:var(--t2);border:1px solid var(--b1);}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:7px;}
.btn-d{background:transparent;color:var(--ng);border:1px solid rgba(232,80,106,0.3);font-size:12px;padding:5px 9px;border-radius:7px;cursor:pointer;}
.empty{text-align:center;color:var(--t2);font-size:14px;padding:20px 0;}
.brand-selector{display:flex;flex-wrap:wrap;gap:7px;}
.input-wrap{display:flex;align-items:center;gap:6px;}
.input-wrap .finput{flex:1;}
.input-unit{font-size:13px;color:var(--t2);white-space:nowrap;flex-shrink:0;}
.brand-opt{background:var(--s2);border:2px solid var(--b1);border-radius:10px;cursor:pointer;padding:8px 10px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);transition:.15s;}
.brand-opt.on{border-color:var(--accent);color:var(--accent);background:rgba(91,141,238,0.1);}

</style>
</head>
<body>
<!-- SIDEBAR (PC only) -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">Card<em>Board</em> <span style="font-size:11px;color:var(--t2);background:rgba(255,255,255,0.07);border:1px solid var(--b1);border-radius:4px;padding:1px 6px;vertical-align:middle">β</span></div>
  <div id="sidebar-nav"></div>
  <div class="sidebar-settings">
    <button class="sidebar-btn" id="sidebar-settings-btn" onclick="goTab('settings')">
      <span class="sidebar-btn-icon" id="sidebar-settings-icon"></span>設定
    </button>
  </div>
</nav>
<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-logo">Card<em>Board</em> <span style="font-size:11px;color:var(--t2);background:rgba(255,255,255,0.07);border:1px solid var(--b1);border-radius:4px;padding:1px 5px;vertical-align:middle">β</span></div>
  <div class="topbar-right" id="topbar-right">
    <button class="icon-btn topbar-settings-btn" onclick="goTab('settings')" title="設定" style="display:flex;align-items:center;gap:4px;font-size:13px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" fill="currentColor"/><path d="M12 2a1.5 1.5 0 011.5 1.5v.77a7.5 7.5 0 012.18.9l.55-.55a1.5 1.5 0 012.12 2.12l-.55.55c.38.68.67 1.41.9 2.18h.77a1.5 1.5 0 010 3h-.77a7.5 7.5 0 01-.9 2.18l.55.55a1.5 1.5 0 01-2.12 2.12l-.55-.55a7.5 7.5 0 01-2.18.9v.77a1.5 1.5 0 01-3 0v-.77a7.5 7.5 0 01-2.18-.9l-.55.55a1.5 1.5 0 01-2.12-2.12l.55-.55A7.5 7.5 0 014.27 13.5H3.5a1.5 1.5 0 010-3h.77a7.5 7.5 0 01.9-2.18l-.55-.55A1.5 1.5 0 016.74 5.65l.55.55a7.5 7.5 0 012.18-.9V4.5A1.5 1.5 0 0112 3z" fill="currentColor" opacity=".7" fill-rule="evenodd" clip-rule="evenodd"/></svg>設定</button>
  </div>
</header>
<!-- PAGES -->
<div class="pages">
  <!-- HOME -->
  <div id="pg-home" class="page on">
    <div id="home-body"></div>
  </div>
  <!-- DASH (Input) -->
  <div id="pg-dash" class="page">
    <div id="dash-backup-reminder"></div>
    <div class="month-sw">
      <button class="msw-btn on" id="msw0" onclick="switchMonth(0)"></button>
      <button class="msw-btn"   id="msw1" onclick="switchMonth(1)"></button>
    </div>
    <div id="dash-body"></div>
  </div>
  <!-- STATS -->
  <div id="pg-stats" class="page">
    <div class="month-sw">
      <button class="msw-btn on" id="smsw0" onclick="switchStatsMonth(0)"></button>
      <button class="msw-btn"   id="smsw1" onclick="switchStatsMonth(1)"></button>
    </div>
    <div id="stats-body"></div>
  </div>
  <!-- CALENDAR -->
  <div id="pg-cal" class="page">
    <div class="month-sw">
      <button class="msw-btn on" id="cmsw0" onclick="switchCalMonth(0)"></button>
      <button class="msw-btn"   id="cmsw1" onclick="switchCalMonth(1)"></button>
    </div>
    <div class="cal-wrap">
      <!-- PC: 7列グリッド -->
      <div class="cal-dow-row">
        <div class="cal-dow sun">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div>
        <div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div><div class="cal-dow sat">土</div>
      </div>
      <div class="cal-grid-pc" id="cal-grid-pc"></div>
      <!-- SP: 縦リスト -->
      <div class="cal-list" id="cal-grid-sp"></div>
      <div class="cal-legend">
        <div class="leg"><div class="leg-dot" style="background:var(--ng)"></div>引き落とし</div>
        <div class="leg"><div class="leg-dot" style="background:var(--ok)"></div>収入</div>
        <div class="leg"><div class="leg-dot" style="background:var(--a2)"></div>支出</div>
      </div>
    </div>
  </div>
  <!-- CARDS -->
  <div id="pg-cards" class="page">
    <div id="cards-body"></div>
  </div>
  <!-- SETTINGS -->
  <div id="pg-settings" class="page">
    <div class="st-wrap" id="settings-body"></div>
  </div>
</div>
<!-- BOTTOM TABS -->
<nav class="btabs" id="btabs"></nav>
<!-- MODAL -->
<div class="ov" id="ov" onclick="ovClose(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="m-title"></h3>
    <div id="m-body"></div>

function syncNextMonthBalance(){
  const[y0,y1]=getDisplayYms();
  const md0=getMD(y0),md1=getMD(y1);
  md1.balance=Math.max(0,calcNet(y0));
  const fixedSorted=md0.items.filter(it=>it.isFixed).sort((a,b)=>(a.order||0)-(b.order||0));
  fixedSorted.forEach(src=>{
    const ex=md1.items.find(it=>it.id===src.id&&it.isFixed);
    if(ex){Object.assign(ex,{order:src.order,label:src.label,amount:src.amount,day:src.day,dayMode:src.dayMode});}
    else{md1.items.push({...src,checked:false});}
  });
  md1.items=md1.items.filter(it=>!it.isFixed||fixedSorted.find(s=>s.id===it.id));
}

const HL={
  '2025-01-01':'元日','2025-01-13':'成人の日','2025-02-11':'建国記念日',
  '2025-02-23':'天皇誕生日','2025-02-24':'振替休日','2025-03-20':'春分の日',
  '2025-04-29':'昭和の日','2025-05-03':'憲法記念日','2025-05-04':'みどりの日',

  '2025-08-11':'山の日','2025-09-15':'敬老の日','2025-09-23':'秋分の日',
  '2025-10-13':'スポーツの日','2025-11-03':'文化の日','2025-11-23':'勤労感謝の日','2025-11-24':'振替休日',
  '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念日',
  '2026-02-23':'天皇誕生日','2026-03-20':'春分の日','2026-04-29':'昭和の日',
  '2026-05-03':'憲法記念日','2026-05-04':'みどりの日','2026-05-05':'こどもの日',
  '2026-05-06':'振替休日','2026-07-20':'海の日','2026-08-11':'山の日',
  '2026-09-21':'敬老の日','2026-09-22':'秋分の日','2026-10-12':'スポーツの日',
  '2026-11-03':'文化の日','2026-11-23':'勤労感謝の日',
};
function fmtD(d){return`${d.getFullYear()}-${z2(d.getMonth()+1)}-${z2(d.getDate())}`;}
function isHL(d){return HL[fmtD(d)]||null;}
function isNBD(d){const w=d.getDay();return w===0||w===6||!!isHL(d);}
function prevBiz(y,m,day){let d=new Date(y,m-1,day);while(isNBD(d))d=new Date(d.getTime()-864e5);return d;}
function nextBiz(y,m,day){let d=new Date(y,m-1,day);while(isNBD(d))d=new Date(d.getTime()+864e5);return d;}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function z2(n){return String(n).padStart(2,'0');}
function fy(n){if(isNaN(n)||n==null)return'¥0';const a=Math.abs(Math.round(n));return(n<0?'-¥':'¥')+a.toLocaleString('ja-JP');}
function ymLbl(y){const[yr,mo]=y.split('-');return`${yr}年${parseInt(mo)}月`;}
function todayStr(){return fmtD(new Date());}
function toHalf(v){return String(v).replace(/[０-９－＋．]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[ー−]/g,'-');}
function fmtAmt(v){if(v===''||v==null)return'';const n=parseFloat(String(v).replace(/,/g,''));return isNaN(n)?'':n.toLocaleString('ja-JP');}
function parseAmt(v){return parseFloat(toHalf(String(v)).replace(/,/g,''))||0;}
function fmtAmtInput(v){const h=toHalf(v);const raw=h.replace(/[^0-9\-]/g,'');if(raw===''||raw==='-')return raw;const neg=raw.startsWith('-');const num=parseInt(raw.replace('-',''),10);if(isNaN(num))return'';return(neg?'-':'')+num.toLocaleString('ja-JP');}

function calcAssets(ymStr){
  const md=getMD(ymStr);
  const chk=(md.items||[]).filter(it=>it.checked&&it.amount>0).reduce((s,it)=>s+it.amount,0);
  const exp=(md.items||[]).filter(it=>it.checked&&it.amount<0).reduce((s,it)=>s+it.amount,0);
  return(md.balance||0)+chk+exp;
}
function calcLiab(ymStr){
  const md=getMD(ymStr),[,m]=ymStr.split('-').map(Number);
  const vis=S.cards.filter(c=>c.visible);
  return vis.reduce((s,c)=>s+(md.cardAmounts[c.id]||0),0)
        +vis.filter(c=>c.annualFee>0&&c.annualMonth===m).reduce((s,c)=>s+c.annualFee,0);
}
function calcNet(ymStr){return calcAssets(ymStr)-calcLiab(ymStr);}

function applyDayMode(y,m,day,mode){
  const dim=new Date(y,m,0).getDate(),safe=Math.min(day,dim);
  if(mode==='next') return nextBiz(y,m,safe);
  if(mode==='exact') return new Date(y,m-1,safe);
  return prevBiz(y,m,safe);
}

let activeTab=(()=>{

  const hidden=JSON.parse(localStorage.getItem(SK)||'{}').tabHidden||[];
  const valid=['home','dash','stats','cal','cards','settings'];

function buildTabs(){
  // homeを除いたオーダーを管理
  const nonHomeDefs=TAB_DEFS.filter(t=>t.id!=='home');
  const order=(S.tabOrder||nonHomeDefs.map(t=>t.id)).filter(id=>id!=='home');
  nonHomeDefs.forEach(t=>{if(!order.includes(t.id))order.push(t.id);});
  // homeを常に先頭に固定して結合
  const defs=[TAB_DEFS.find(t=>t.id==='home'),...order.map(id=>TAB_DEFS.find(t=>t.id===id)).filter(Boolean)];
  const hidden=S.tabHidden||[];
  const tabDefs=defs.filter(t=>t.id!=='settings'&&!(hidden.includes(t.id)&&!t.fixed));

  document.getElementById('btabs').innerHTML=tabDefs.map(t=>
    `<button class="btab${t.id===activeTab?' on':''}" data-tab="${t.id}" onclick="goTab('${t.id}')">
      <span class="btab-icon">${tabSvg(t.id,t.id===activeTab)}</span><span>${t.label}</span>
    </button>`
  ).join('');

  const nav=document.getElementById('sidebar-nav');
  if(nav)nav.innerHTML=tabDefs.map(t=>
    `<button class="sidebar-btn${t.id===activeTab?' on':''}" data-tab="${t.id}" onclick="goTab('${t.id}')">
      <span class="sidebar-btn-icon">${tabSvg(t.id,t.id===activeTab)}</span>${t.label}
    </button>`
  ).join('');
  // 設定ボタンアイコンをJS側でセット
  const stIcon=document.getElementById('sidebar-settings-icon');
  if(stIcon)stIcon.innerHTML=tabSvg('settings',activeTab==='settings');
  const stBtn=document.getElementById('sidebar-settings-btn');
  if(stBtn)stBtn.classList.toggle('on',activeTab==='settings');
}

  activeTab=id;

  buildTabs();

let dashIdx=0;
let dashEditMode=false;

function switchMonth(idx){dashIdx=idx;renderDash();}

function renderDash(){
  syncNextMonthBalance();
  const yms=getDisplayYms();
  const cur=document.getElementById('msw0'),nxt=document.getElementById('msw1');
  cur.textContent=ymLbl(yms[0]);nxt.textContent=ymLbl(yms[1]);
  cur.classList.toggle('on',dashIdx===0);nxt.classList.toggle('on',dashIdx===1);

  const ymStr=yms[dashIdx];
  const md=getMD(ymStr);
  const[y,m]=ymStr.split('-').map(Number);
  const vis=S.cards.filter(c=>c.visible);
  const assets=calcAssets(ymStr),liab=calcLiab(ymStr),net=assets-liab;
  const netCls=net>=0?'ok':net>=-50000?'warn':'ng';
  const ts=todayStr();

  // tutorial → renderHome側で描画
  checkBackupReminder();

  const sorted=[...(md.items||[])].sort((a,b)=>(a.order||0)-(b.order||0));
  const fixedItems=sorted.filter(it=>it.isFixed);
  const otherItems=sorted.filter(it=>!it.isFixed);

  const[ym0,ym1]=yms;
  const md0=getMD(ym0),md1=getMD(ym1);
  const[y1p,m1p]=ym1.split('-').map(Number);

  // カードアコーディオン（インライン入力）- 日付昇順→金額降順
  const visWithMeta=vis.map(c=>{
    const amt=md.cardAmounts[c.id]||0;
    const raw=c.billDay===99?new Date(y,m,0).getDate():c.billDay;
    const act=nextBiz(y,m,raw);
    const diff=(act-new Date(ts))/864e5;
    return{c,amt,act,diff};
  }).sort((a,b)=>{
    const ap=a.diff<0,bp=b.diff<0;
    if(ap!==bp)return ap?1:-1;
    return ap?b.act-a.act:a.act-b.act||b.amt-a.amt;
  });

  const cardRows=visWithMeta.map(({c,amt,act,diff})=>{
    let dc='cacc-date';
    if(diff<0)dc+=' past';
    else if(diff>=0&&diff<1)dc+=' tod';else if(diff>=0&&diff<=5)dc+=' soon';
    const raw=c.billDay===99?new Date(y,m,0).getDate():c.billDay;
    const shifted=fmtD(act)!==`${y}-${z2(m)}-${z2(raw)}`;
    const raw1=c.billDay===99?new Date(y1p,m1p,0).getDate():c.billDay;
    const act1=nextBiz(y1p,m1p,raw1);
    const amt0=md0.cardAmounts[c.id]||0;
    const amt1=md1.cardAmounts[c.id]||0;
    return`<div class="cacc-head" onclick="toggleAcc(${c.id})">
      <span class="cacc-name${diff<0?' past':''}">${c.name}</span>
      <span style="width:18px;text-align:center;flex-shrink:0;font-size:13px">${diff<0&&amt>0?'🪦':''}</span>
      <span class="${dc}">${m}月${act.getDate()}日${shifted?'*':''}</span>
      <span class="cacc-amt${amt===0?' zero':diff<0?' past':''}">${amt===0?'—':fy(amt)}</span>
      <span class="cacc-chev" id="chev-${c.id}">▾</span>
    </div>
    <div class="cacc-body" id="acc-${c.id}">
      <div class="cacc-meta">締め日 ${c.closeDay===99?'末日':c.closeDay+'日'} / 引き落とし ${m}月${act.getDate()}日${shifted?' (振替)':''} / ${m1p}月${act1.getDate()}日</div>
      <div class="cacc-months">
        <div class="cacc-month-row">
          <span class="cacc-month-lbl">${ymLbl(ym0)}</span>
          <input class="cacc-input" id="ci0-${c.id}" type="text" inputmode="numeric"
            value="${amt0?fmtAmt(amt0):''}" placeholder="0"
            oninput="this.value=fmtAmtInput(this.value)"
            onchange="saveAmtInline(${c.id})"
            onkeydown="if(event.key==='Enter'){saveAmtInline(${c.id});this.blur();}">
        </div>
        <div class="cacc-month-row">
          <span class="cacc-month-lbl">${ymLbl(ym1)}</span>
          <input class="cacc-input" id="ci1-${c.id}" type="text" inputmode="numeric"
            value="${amt1?fmtAmt(amt1):''}" placeholder="0"
            oninput="this.value=fmtAmtInput(this.value)"
            onchange="saveAmtInline(${c.id})"
            onkeydown="if(event.key==='Enter'){saveAmtInline(${c.id});this.blur();}">
        </div>
      </div>
    </div>`;
  }).join('');

  const DM_LABEL={'prev':'前営業日','next':'後営業日','exact':'当日'};

  const itemRow=(it,drag)=>`
    <div class="row"${drag&&dashEditMode?` draggable="true" data-item-id="${it.id}" data-ym="${ymStr}"
      ondragstart="itemDragStart(event)" ondragover="itemDragOver(event)" ondrop="itemDrop(event,'${ymStr}')"
      style="user-select:none;-webkit-user-select:none"`:''}>
      ${dashEditMode
        ?`<span class="row-drag" style="cursor:grab;touch-action:none">⠿</span>`
        :`<div class="chk${it.checked?' on':''}" onclick="toggleItem('${ymStr}',${it.id})">${it.checked?'✓':''}</div>`
      }
      <span class="row-lbl${it.checked&&!dashEditMode?' done':''}"
        onclick="${dashEditMode?`editItem('${ymStr}',${it.id})`:''}"
        style="${dashEditMode?'cursor:pointer':''}">${it.label}</span>
      ${!dashEditMode&&it.day!=null
        ?`<span style="font-size:11px;color:var(--t3);font-family:var(--mono);white-space:nowrap;min-width:52px;text-align:center">${it.day}日<br><span style="font-size:9px;opacity:.7">${DM_LABEL[it.dayMode||'prev']}</span></span>`
        :`<span style="min-width:52px"></span>`
      }
      <span class="row-val${it.amount<0?' neg':' pos'}"
        onclick="editItem('${ymStr}',${it.id})"
        style="cursor:pointer;min-width:70px;text-align:right">${fy(it.amount)}</span>
      ${dashEditMode?`<button class="rdel" onclick="delItem('${ymStr}',${it.id})">×</button>`:''}
    </div>`;

  // 口座残高（タップで入力）
  const balRow=`<div class="row" id="bal-row-${ymStr}" onclick="activateBalInput('${ymStr}')" style="cursor:pointer">
    <span class="row-lbl">口座残高</span>
    <span style="min-width:52px"></span>
    <span class="row-val pos" id="bal-display-${ymStr}" style="font-family:var(--mono);min-width:70px;text-align:right">${md.balance?fy(md.balance):'—'}</span>
    <input class="cacc-input" id="bal-input-${ymStr}" type="text" inputmode="numeric"
      style="max-width:160px;font-size:15px;display:none"
      value="${md.balance?fmtAmt(md.balance):''}" placeholder="0"
      oninput="this.value=fmtAmtInput(this.value)"
      onkeydown="if(event.key==='Enter'){this.blur();}"
      onblur="saveBalInline('${ymStr}')">
  </div>`;

  document.getElementById('dash-body').innerHTML=`
    <div class="sec">
      <div class="sec-head">
        <span class="sec-title">残高・収支</span>
        <button class="edit-mode-btn${dashEditMode?' on':''}" onclick="toggleDashEdit()">${dashEditMode?'完了':'編集'}</button>
      </div>
      <div class="gb" style="border-bottom:none;border-radius:14px 14px 0 0">
        <div class="gb-scroll">
          ${balRow}
          ${fixedItems.length?`<div class="sec-divider">固定項目（毎月）</div>`:''}
          ${fixedItems.map(it=>itemRow(it,true)).join('')}
          ${otherItems.length?`<div class="sec-divider">当月のみ</div>`:''}
          ${otherItems.map(it=>itemRow(it,false)).join('')}
          <div class="add-strip">
            <button class="add-pill" onclick="openModal('addFixed','${ymStr}')">＋ 固定項目</button>
            <button class="add-pill" onclick="openModal('addOther','${ymStr}')">＋ 当月のみ</button>
          </div>
        </div>
      </div>
      <div class="sec-footer-outer">
        <span style="font-size:12px;color:var(--t2);font-weight:700;letter-spacing:.4px">収支合計</span>
        <span style="font-family:var(--mono);font-size:15px;font-weight:500;color:${assets>=0?'var(--ok)':'var(--ng)'}">${fy(assets)}</span>
      </div>
    </div>

    <div class="sec">
      <div class="sec-head"><span class="sec-title">引き落とし予定</span></div>
      <div class="gb" style="${vis.length>0?'border-bottom:none;border-radius:14px 14px 0 0':''}">
        <div class="gb-scroll">
          ${cardRows}
          ${vis.length===0?`<div class="empty">表示中のカードなし<br><small style="color:var(--t3)">カードタブで設定してください</small></div>`:''}
        </div>
      </div>
      ${vis.length>0?`<div class="sec-footer-outer">
        <span style="font-size:12px;color:var(--t2);font-weight:700;letter-spacing:.4px">引き落とし合計</span>
        <span style="font-family:var(--mono);font-size:15px;font-weight:500;color:var(--ng)">${fy(liab)}</span>
      </div>`:''}
    </div>`;
}

     <button class="btn btn-p" onclick="_saveEditItem(${id},${it.isFixed})">保存</button>`);

function _saveEditItem(id,isFixed){
  const l=document.getElementById('ei_l').value.trim();
  const a=parseAmt(document.getElementById('ei_a').value);
  const dv=document.getElementById('ei_d').value;
  const day=dv?parseInt(dv.split('-')[2]):null;
  const dayMode=document.getElementById('ei_dm').value;
  if(!l){alert('項目名を入力してください');return;}
  const yms=getDisplayYms();
  const targets=isFixed?yms:[_mYm];
  targets.forEach(y=>{
    const it=(getMD(y).items||[]).find(x=>x.id===id);
    if(it){it.label=l;it.amount=a;it.day=day;it.dayMode=dayMode;}
  });
  save();mClose();renderDash();renderHome();
}
let _dragItemId=null;
function itemDragStart(e){_dragItemId=parseInt(e.currentTarget.dataset.itemId);e.dataTransfer.effectAllowed='move';}
function itemDragOver(e){e.preventDefault();}
function itemDrop(e,ymStr){
  e.preventDefault();
  const targetId=parseInt(e.currentTarget.dataset.itemId);
  if(!_dragItemId||_dragItemId===targetId)return;
  const md=getMD(ymStr),items=md.items;
  const src=items.find(i=>i.id===_dragItemId),tgt=items.find(i=>i.id===targetId);
  if(!src||!tgt||src.isFixed!==tgt.isFixed)return;
  const so=src.order,to=tgt.order;src.order=to;tgt.order=so;
  if(src.isFixed){
    const md1=getMD(getDisplayYms()[1]);
    const s1=md1.items.find(i=>i.id===src.id),t1=md1.items.find(i=>i.id===tgt.id);
    if(s1&&t1){s1.order=to;t1.order=so;}
  }
  save();renderDash();renderHome();
}

let calIdx=0;
let _calCharts={};

function switchCalMonth(idx){
  calIdx=idx;
  renderCal();

function renderCal(){
  const yms=getDisplayYms();
  const ymStr=yms[calIdx];
  const cur=document.getElementById('cmsw0');
  const nxt=document.getElementById('cmsw1');
  if(cur)cur.textContent=ymLbl(yms[0]);
  if(nxt)nxt.textContent=ymLbl(yms[1]);
  if(cur)cur.classList.toggle('on',calIdx===0);
  if(nxt)nxt.classList.toggle('on',calIdx===1);
  const[y,m]=ymStr.split('-').map(Number),md=getMD(ymStr);
  const ev={};
  function add(ds,e){if(!ev[ds])ev[ds]=[];ev[ds].push(e);}

  // 引き落とし（日付ごとに合算）
  const billByDate={};
  S.cards.filter(c=>c.visible).forEach(c=>{
    const raw=c.billDay===99?new Date(y,m,0).getDate():c.billDay;
    const ds=fmtD(nextBiz(y,m,raw));
    billByDate[ds]=(billByDate[ds]||0)+(md.cardAmounts[c.id]||0);
  });
  Object.entries(billByDate).forEach(([ds,t])=>{if(t>0)add(ds,{cls:'bill',lbl:`引き落とし ${fy(t)}`});});

  // 収支項目
  (md.items||[]).forEach(it=>{
    if(it.day==null)return;
    const d=applyDayMode(y,m,it.day,it.dayMode||'prev');
    add(fmtD(d),{cls:it.amount>0?'inc':'io',lbl:`${it.label} ${fy(it.amount)}`});
  });

  // ── PC用グリッド ──
  const fd=new Date(y,m-1,1).getDay(),dim=new Date(y,m,0).getDate(),pd=new Date(y,m-1,0).getDate();
  let pcHtml='';
  function mkCcell(d,isDim){
    const ds=fmtD(d),dw=d.getDay(),hol=isHL(d),today=ds===todayStr();
    let cls='ccell';
    if(isDim)cls+=' dim';
    if(today)cls+=' today';
    if(dw===0||hol)cls+=' csun';else if(dw===6)cls+=' csat';
    const dayHtml=`<div class="cday${today?' cday-today':''}">${d.getDate()}</div>`;
    const chips=(ev[ds]||[]).map(e=>`<div class="cchip ${e.cls}" title="${e.lbl}">${e.lbl}</div>`).join('');
    return`<div class="${cls}">${dayHtml}${chips}</div>`;
  }
  for(let i=fd-1;i>=0;i--)pcHtml+=mkCcell(new Date(y,m-2,pd-i),true);
  for(let d=1;d<=dim;d++)pcHtml+=mkCcell(new Date(y,m-1,d),false);
  const rem=(7-((fd+dim)%7))%7;
  for(let i=1;i<=rem;i++)pcHtml+=mkCcell(new Date(y,m,i),true);
  document.getElementById('cal-grid-pc').innerHTML=pcHtml;

  // ── SP用縦リスト ──
  const DOW=['日','月','火','水','木','金','土'];
  let spHtml='';
  let curWeek=-1;
  for(let d=1;d<=dim;d++){
    const date=new Date(y,m-1,d);
    const ds=fmtD(date),dw=date.getDay();
    const week=Math.floor((fd+d-1)/7);
    const hol=isHL(date),today=ds===todayStr();
    const events=ev[ds]||[];
    if(week!==curWeek){
      curWeek=week;
      const we=new Date(y,m-1,Math.min(d+(6-dw),dim));
      spHtml+=`<div class="cal-week-sep">${m}/${d} – ${m}/${we.getDate()}</div>`;
    }
    let rowCls='cal-row';
    if(today)rowCls+=' today';
    if(dw===0||hol)rowCls+=' sun';else if(dw===6)rowCls+=' sat';
    if(hol)rowCls+=' hol';
    const numHtml=today
      ?`<div class="cal-date-num today-circle">${d}</div>`
      :`<div class="cal-date-num">${d}</div>`;
    const evHtml=events.map(e=>{
      const parts=e.lbl.split(' ');
      const label=e.cls==='bill'?'引き落とし':parts[0];
      const amt=e.cls==='bill'?parts.slice(1).join(' '):parts.slice(1).join(' ');
      return`<div class="cal-event ${e.cls}"><span class="cal-event-lbl">${label}</span><span class="cal-event-amt">${amt}</span></div>`;
    }).join('');
    spHtml+=`<div class="${rowCls}">
      <div class="cal-date-col">${numHtml}<div class="cal-date-dow">${DOW[dw]}</div></div>
      <div class="cal-events-col">${evHtml}</div>
    </div>`;
  }
  document.getElementById('cal-grid-sp').innerHTML=spHtml;
}

function renderHome(){
  const yms=getDisplayYms();
  const ymStr=yms[0];
  const[y,m]=ymStr.split('-').map(Number);
  const md=getMD(ymStr);
  const vis=S.cards.filter(c=>c.visible);
  const assets=calcAssets(ymStr),liab=calcLiab(ymStr),net=assets-liab;
  const netCls=net>=0?'ok':net>=-50000?'warn':'ng';
  const totalAF=calcTotalAnnualFee();
  const rank=getAfRank(totalAF);
  const nextRank=AF_RANKS[Math.max(0,AF_RANKS.indexOf(rank)-1)];
  const nextThresh=rank===AF_RANKS[0]?null:nextRank.thresh;
  const progress=nextThresh?Math.min(100,totalAF/nextThresh*100):100;

  // チュートリアル
  const tutEl=document.getElementById('tutorial-float');
  const tutStep=S.tutStep||0;
  if(tutEl)tutEl.innerHTML=S.firstLaunch?`<div class="tutorial-banner">
    ${tutStep===0?`
      <div class="tutorial-banner-title">CardBoardへようこそ</div>
      <div class="tutorial-banner-body" style="margin-top:6px">まずデータの扱いを選んでください。</div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <button class="btn btn-sm btn-g" style="flex:1" onclick="dismissTutorial(true)">まっさらにはじめる</button>
        <button class="btn btn-sm btn-p" style="flex:1" onclick="advanceTutorial(1)">デモデータで確認する</button>
      </div>
    `:tutStep===1?`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">1</div>
        <div class="tutorial-banner-title" style="margin:0">口座残高を入力しましょう</div>
      </div>
      <div class="tutorial-banner-body">「明細」タブの口座残高欄に直接入力できます。</div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
        <button class="btn btn-sm btn-g" onclick="advanceTutorial(0)">戻る</button>
        <button class="btn btn-sm btn-p" onclick="advanceTutorial(2)">次へ →</button>
      </div>
    `:tutStep===2?`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">2</div>
        <div class="tutorial-banner-title" style="margin:0">カードを追加しましょう</div>
      </div>
      <div class="tutorial-banner-body">「カード」タブからクレジットカードを登録できます。<br>締め日・引き落とし日を入力するとカレンダーに表示されます。</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
        <button class="btn btn-sm btn-g" onclick="advanceTutorial(1)">戻る</button>
        <button class="btn btn-sm btn-p" onclick="completeTutorial()">完了</button>
      </div>
    `:''}
  </div>`:'';


  // 今月引き落としリスト（未来：日付昇順→金額降順、済み：下部）
  const ts=todayStr();
  const homeCards=vis.map(c=>{
    const raw=c.billDay===99?new Date(y,m,0).getDate():c.billDay;
    const act=nextBiz(y,m,raw);
    const amt=md.cardAmounts[c.id]||0;
    const diff=(act-new Date(ts))/864e5;
    return{name:c.name,act,amt,diff};
  }).sort((a,b)=>{
    const ap=a.diff<0,bp=b.diff<0;
    if(ap!==bp)return ap?1:-1;
    return ap?b.act-a.act:a.act-b.act||b.amt-a.amt;
  });

  const billList=homeCards.length?homeCards.map(c=>{
    const dateStr=`${m}/${c.act.getDate()}`;
    const isPast=c.diff<0;
    const isSoon=c.diff>=0&&c.diff<=5;
    const isToday=c.diff>=0&&c.diff<1;
    const emoji=isPast&&c.amt>0?'🪦':'';
    const dateColor=isToday?'color:var(--ng);font-weight:700':isSoon?'color:var(--warn)':'color:var(--t3)';
    const nameColor=isPast?'color:var(--t3)':'color:var(--text)';
    const amtColor=isPast?'color:var(--t3)':'color:var(--ng)';
    return`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;${nameColor};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
        <div style="font-size:10px;${dateColor};margin-top:1px">${emoji} ${dateStr}</div>
      </div>
      <span style="font-family:var(--mono);font-size:13px;${amtColor};white-space:nowrap;flex-shrink:0">${c.amt>0?fy(c.amt):'—'}</span>
    </div>`;
  }).join(''):`<div class="empty">引き落とし予定なし</div>`;

  document.getElementById('home-body').innerHTML=`
    <!-- 年会費ランク（最上部） -->
    <div style="background:${rank.bg};border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:18px;margin-bottom:13px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-20px;right:-20px;font-size:80px;opacity:.08;pointer-events:none">${rank.icon}</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">年会費ランク</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <span style="font-size:22px">${rank.icon}</span>
        <div>
          <div style="font-size:18px;font-weight:700;color:${rank.color}">${rank.name}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.4)">${rank.desc}</div>
        </div>
      </div>
      <div style="font-family:var(--mono);font-size:22px;font-weight:500;color:rgba(255,255,255,0.9);margin:8px 0 4px">${fy(totalAF)}<span style="font-size:12px;opacity:.5">/年</span></div>
      ${nextThresh?`
        <div style="margin-top:10px">
          <div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:4px">
            <span>次のランク: ${nextRank.name}</span>
            <span>${fy(nextThresh-totalAF)} 不足</span>
          </div>
          <div style="background:rgba(0,0,0,0.3);border-radius:4px;height:4px;overflow:hidden">
            <div style="width:${progress}%;height:100%;background:${rank.color};border-radius:4px;transition:.3s"></div>
          </div>
        </div>
      `:'<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:6px">最高ランク到達</div>'}
    </div>

    <!-- 予測残高ヒーロー -->
    <div style="background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:18px;margin-bottom:13px">
      <div style="font-size:11px;color:var(--t2);letter-spacing:.4px;margin-bottom:5px">引き落とし後の予測残高</div>
      <div style="font-family:var(--mono);font-size:36px;font-weight:500;letter-spacing:-1px;line-height:1;color:${net>=0?'var(--ok)':net>=-50000?'var(--warn)':'var(--ng)'}">${fy(net)}</div>
      <div style="font-size:12px;color:var(--t2);margin-top:5px">${net>=0?'問題なし':'⚠ 残高不足の可能性あり'}</div>
      <div style="display:flex;gap:8px;margin-top:13px;padding-top:13px;border-top:1px solid var(--b1)">
        <div style="flex:1;background:var(--s2);border-radius:10px;padding:10px 12px;border:1px solid var(--b1)">
          <div style="font-size:10px;color:var(--t2);margin-bottom:3px">残高</div>
          <div style="font-family:var(--mono);font-size:14px;color:var(--ok)">${fy(assets)}</div>
        </div>
        <div style="flex:1;background:var(--s2);border-radius:10px;padding:10px 12px;border:1px solid var(--b1)">
          <div style="font-size:10px;color:var(--t2);margin-bottom:3px">引き落とし</div>
          <div style="font-family:var(--mono);font-size:14px;color:var(--ng)">${fy(liab)}</div>
        </div>
      </div>
    </div>

    <!-- 今月引き落としリスト -->
    <div style="background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:16px;margin-bottom:13px">
      <div style="font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px">${ymLbl(ymStr)} 引き落とし予定</div>
      ${billList}
      ${liab>0?`<div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:2px">
        <span style="font-size:12px;color:var(--t2);font-weight:700">合計</span>
        <span style="font-family:var(--mono);font-size:14px;color:var(--ng);flex-shrink:0">${fy(liab)}</span>
      </div>`:''}
    </div>
  `;
}

let statsIdx=0;
function switchStatsMonth(idx){statsIdx=idx;renderStats();}

function renderStats(){
  const yms=getDisplayYms();
  const cur=document.getElementById('smsw0'),nxt=document.getElementById('smsw1');
  if(!cur||!nxt)return;
  cur.textContent=ymLbl(yms[0]);nxt.textContent=ymLbl(yms[1]);
  cur.classList.toggle('on',statsIdx===0);nxt.classList.toggle('on',statsIdx===1);
  const ymStr=yms[statsIdx];
  const[,m]=ymStr.split('-').map(Number),md=getMD(ymStr);
  const vis=S.cards.filter(c=>c.visible);
  const COLORS=['#5b8dee','#7c5cfc','#27c485','#e8506a','#f09c2a','#e060d0','#40c8e0','#a0d040','#f06090','#80a0ff','#ffb040'];
  const entries=vis.map((c,i)=>({
    name:c.name,
    amt:(md.cardAmounts[c.id]||0),
    color:COLORS[i%COLORS.length]
  })).filter(e=>e.amt>0).sort((a,b)=>b.amt-a.amt);
  const total=entries.reduce((s,e)=>s+e.amt,0);

  const statsEl=document.getElementById('stats-body');
  if(!statsEl)return;

  statsEl.innerHTML=`
    <div class="cal-pie-wrap">
      <div class="cal-pie-title" id="cal-pie-title">${ymLbl(ymStr)} カード別利用額</div>
      <div class="cal-pie-inner">
        <div class="cal-pie-canvas-wrap">
          <canvas id="cal-pie-canvas" width="130" height="130"></canvas>
          <div class="cal-pie-center">
            <div class="cal-pie-center-lbl">合計</div>
            <div class="cal-pie-center-val" id="cal-pie-total">${fy(total)}</div>
          </div>
        </div>
        <div id="cal-pie-legend" style="flex:1;overflow:hidden;">
          ${entries.slice(0,8).map(e=>`<div class="pie-leg-row"><div class="pie-leg-dot" style="background:${e.color}"></div><span class="pie-leg-name">${e.name}</span><span class="pie-leg-val">${fy(e.amt)}</span></div>`).join('')}
          ${!entries.length?'<div class="empty">データなし</div>':''}
        </div>
      </div>
    </div>
    ${entries.length?`<div class="gb" style="margin-bottom:13px">
      ${entries.map(e=>`<div class="row">
        <div style="width:8px;height:8px;border-radius:2px;background:${e.color};flex-shrink:0"></div>
        <span class="row-lbl">${e.name}</span>
        <span style="font-size:11px;color:var(--t2)">${Math.round(e.amt/total*100)}%</span>
        <span class="row-val neg">${fy(e.amt)}</span>
      </div>`).join('')}
    </div>`:''}
  `;

  // チャート描画（データなしでも空グラフ表示）
  const ctx=document.getElementById('cal-pie-canvas')?.getContext('2d');
  if(!ctx)return;
  if(window._statsChart){window._statsChart.destroy();}
  if(!entries.length){
    window._statsChart=new Chart(ctx,{
      type:'doughnut',
      data:{labels:['データなし'],datasets:[{data:[1],backgroundColor:['rgba(255,255,255,0.06)'],borderWidth:0}]},
      options:{cutout:'65%',plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{duration:0}}
    });
    return;
  }
  window._statsChart=new Chart(ctx,{
    type:'doughnut',
    data:{labels:entries.map(e=>e.name),datasets:[{data:entries.map(e=>e.amt),backgroundColor:entries.map(e=>e.color),borderWidth:2,borderColor:'#161927',hoverOffset:5}]},
    options:{cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${fy(c.parsed)} (${Math.round(c.parsed/total*100)}%)`}}},animation:{duration:400}}
  });
}

// CARDS（Wallet風）
// ═══════════════════════════════════════════
let expandedCardId=null;
let cardSortMode='custom'; // custom|closeDay|billDay|brand|annualFee
let showHiddenCards=false;

function renderCards(){
  const body=document.getElementById('cards-body');
  const visCards=S.cards.filter(c=>c.visible);
  const hidCards=S.cards.filter(c=>!c.visible);

  if(!S.cards.length){
    body.innerHTML=`<div style="padding-bottom:20px">
      <button class="wallet-add-btn" onclick="openModal('addCard')">＋ カードを追加</button>
      <div class="empty" style="margin-top:12px">カードが登録されていません</div>
    </div>`;
    return;
  }

  let displayCards=[...visCards];
  if(cardSortMode==='closeDay')displayCards.sort((a,b)=>a.closeDay-b.closeDay);
  else if(cardSortMode==='billDay')displayCards.sort((a,b)=>a.billDay-b.billDay);
  else if(cardSortMode==='brand')displayCards.sort((a,b)=>a.brand.localeCompare(b.brand));
  else if(cardSortMode==='annualFee')displayCards.sort((a,b)=>b.annualFee-a.annualFee);

  // タイル（名前＋ブランドのみ）
  const tiles=displayCards.map(c=>{
    const grad=CARD_GRADIENTS[c.gradientIdx||0];
    return`<div class="wallet-tile" style="background:${grad}" onclick="openCardDetail(${c.id})">
      <div class="wallet-tile-name">${c.name}</div>
      <div class="wallet-tile-brand">${brandIcon(c.brand)}</div>
    </div>`;
  }).join('');

  const sortOpts=[
    {v:'custom',l:'追加順'},{v:'billDay',l:'引き落とし日順'},
    {v:'closeDay',l:'締め日順'},{v:'brand',l:'ブランド順'},{v:'annualFee',l:'年会費順'},
  ];
  const sortSel=`<select onchange="cardSortMode=this.value;renderCards()" style="background:var(--s2);border:1px solid var(--b1);border-radius:7px;color:var(--text);font-size:12px;padding:5px 8px;outline:none;cursor:pointer">
    ${sortOpts.map(o=>`<option value="${o.v}"${cardSortMode===o.v?' selected':''}>${o.l}</option>`).join('')}
  </select>`;
  const hidBtn=hidCards.length?`<button class="edit-mode-btn${showHiddenCards?' on':''}" onclick="showHiddenCards=!showHiddenCards;renderCards()" style="font-size:11px">非表示 ${hidCards.length}枚</button>`:'';
  const toolbar=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="edit-mode-btn" onclick="openModal('addCard')" style="font-size:12px">＋ カードを追加</button>
    <div style="flex:1"></div>${hidBtn}${!showHiddenCards?sortSel:''}
  </div>`;

  if(showHiddenCards){
    const hidList=hidCards.length?hidCards.map(c=>`<div class="row">
      <span class="row-lbl">${c.name}</span>
      <button class="edit-mode-btn" onclick="showCard(${c.id})" style="font-size:11px">表示に戻す</button>
      <button class="btn-d" onclick="delCard(${c.id})">削除</button>
    </div>`).join(''):`<div class="empty">非表示のカードなし</div>`;
    body.innerHTML=toolbar+`<div class="gb">${hidList}</div>
      <button class="edit-mode-btn" onclick="showHiddenCards=false;renderCards()" style="margin-top:10px;font-size:12px;width:100%;justify-content:center">← 一覧に戻る</button>
      <div style="height:32px"></div>`;
    return;
  }
  body.innerHTML=toolbar+`<div class="wallet-wrap">${tiles}</div><div style="height:32px"></div>`;
}

function hideCard(id){
  const c=S.cards.find(x=>x.id===id);
  if(c){c.visible=false;expandedCardId=null;save();renderCards();if(activeTab==='home')renderHome();}
}
function showCard(id){
  const c=S.cards.find(x=>x.id===id);
  if(c){
    c.visible=true;save();
    // 非表示カードが0枚になったら通常表示に戻す
    if(S.cards.filter(x=>!x.visible).length===0)showHiddenCards=false;
    renderCards();
    if(activeTab==='home')renderHome();
  }
}
function openCardDetail(id){
  const c=S.cards.find(x=>x.id===id);
  if(!c)return;
  const grad=CARD_GRADIENTS[c.gradientIdx||0];
  document.getElementById('card-panel').innerHTML=`
    <div class="card-detail-hero" style="background:${grad}">
      <button class="card-detail-close" onclick="cardOvClose()">✕</button>
      <div style="font-size:16px;font-weight:700;color:rgba(255,255,255,0.95)">${c.name}</div>
      <div style="display:flex;justify-content:flex-end">${brandIcon(c.brand)}</div>
    </div>
    <div class="card-detail-body">
      <div class="card-detail-row">
        <span class="card-detail-lbl">締め日 / 引き落とし日</span>
        <span class="card-detail-val">${c.closeDay===99?'末日':c.closeDay+'日'} / ${c.billDay}日</span>
      </div>
      ${c.annualFee?`<div class="card-detail-row">
        <span class="card-detail-lbl">年会費</span>
        <span class="card-detail-val">${fy(c.annualFee)}<span style="font-size:10px;opacity:.6;font-family:var(--sans);margin-left:4px">（${c.annualMonth}月請求）</span></span>
      </div>`:''}
      ${(c.phones||[]).map(p=>`<div class="card-detail-row">
        <span class="card-detail-lbl">${p.label}</span>
        <span class="card-detail-val">${p.number}<button class="copy-btn" onclick="copyText(event,'${p.number}')">コピー</button></span>
      </div>`).join('')}
      ${c.note?`<div class="card-detail-row">
        <span class="card-detail-lbl">備考</span>
        <span class="card-detail-val" style="font-family:var(--sans)">${c.note}</span>
      </div>`:''}
    </div>
    <div class="card-detail-actions">
      <button class="btn btn-g btn-sm" onclick="openModal('addCard',${c.id});cardOvClose()">編集</button>
      <button class="btn btn-g btn-sm" onclick="hideCard(${c.id});cardOvClose()">非表示</button>
      <button class="btn-d" onclick="if(confirm('削除しますか？')){delCard(${c.id});cardOvClose();}">削除</button>
    </div>`;
  document.getElementById('card-ov').classList.add('on');
}
function cardOvClose(e){
  if(e&&e.target!==document.getElementById('card-ov'))return;
  document.getElementById('card-ov').classList.remove('on');
}
function delCard(id){
  if(!confirm('削除しますか？'))return;
  S.cards=S.cards.filter(c=>c.id!==id);save();renderCards();
}
function copyText(e,text){
  e.stopPropagation();
  navigator.clipboard?.writeText(text).then(()=>{
    const btn=e.target;const orig=btn.textContent;
    btn.textContent='✓';setTimeout(()=>btn.textContent=orig,1200);
  });
}

function renderSettings(){
  const lastBk=S.lastBackup;
  let backupSub='最終バックアップ：未取得',showReminder=!lastBk;
  if(lastBk){
    const days=Math.floor((Date.now()-lastBk)/864e5);
    backupSub=`最終バックアップ：${days===0?'今日':days+'日前'}${S.backupCreatedAt?' ('+S.backupCreatedAt+')':''}`;
    if(days>=7)showReminder=true;
  }
  const nonHomeDefs=TAB_DEFS.filter(t=>t.id!=='home');
  const order=(S.tabOrder||nonHomeDefs.map(t=>t.id)).filter(id=>id!=='home');
  nonHomeDefs.forEach(t=>{if(!order.includes(t.id))order.push(t.id);});
  const defs=[TAB_DEFS.find(t=>t.id==='home'),...order.map(id=>TAB_DEFS.find(t=>t.id===id)).filter(Boolean)];
  const hidden=S.tabHidden||[];

  document.getElementById('settings-body').innerHTML=`
    ${showReminder?`<div class="backup-banner">⚠ ${!lastBk?'バックアップが未取得です':'前回バックアップから'+Math.floor((Date.now()-lastBk)/864e5)+'日経過'}
      <button onclick="doExport()" style="background:rgba(240,156,42,0.2);border:1px solid rgba(240,156,42,0.4);border-radius:6px;color:var(--warn);cursor:pointer;font-size:12px;font-weight:700;padding:4px 9px">今すぐ</button>
    </div>`:''}

    <div class="st-sec"><div class="st-sec-title">データ管理</div>
      <div class="st-row" onclick="doExport()">
        <span class="st-icon">↓</span>
        <div class="st-body"><div class="st-lbl">バックアップをダウンロード</div><div class="st-sub">${backupSub}</div></div>
        <span class="st-arr">›</span>
      </div>
      <div class="st-row" onclick="document.getElementById('st-file').click()">
        <span class="st-icon">↑</span>
        <div class="st-body"><div class="st-lbl">バックアップから復元</div><div class="st-sub">JSONファイルを選択</div></div>
        <span class="st-arr">›</span>
      </div>
      <input type="file" id="st-file" accept=".json" style="display:none" onchange="doImport(event)">
      <div class="st-row" style="border-color:rgba(232,80,106,0.2)" onclick="confirmReset()">

let _touchDragTabId=null,_touchDragEl=null,_dragTabId=null;
function tabDragStart(e,id){_dragTabId=id;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dragging');}
function tabDragOver(e){e.preventDefault();document.querySelectorAll('.tab-order-item').forEach(el=>el.classList.remove('drag-over'));e.currentTarget.classList.add('drag-over');}
function tabTouchStart(e,id){
  const def=TAB_DEFS.find(t=>t.id===id);
  if(def?.fixed)return;
  e.stopPropagation();
  _touchDragTabId=id;
  _touchDragEl=e.currentTarget.closest('.tab-order-item');
  if(_touchDragEl)_touchDragEl.classList.add('dragging');
}
function tabTouchMove(e){
  if(!_touchDragTabId)return;
  e.preventDefault();
  const touch=e.touches[0];
  const el=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.tab-order-item');
  document.querySelectorAll('.tab-order-item').forEach(x=>x.classList.remove('drag-over'));
  if(el&&el!==_touchDragEl)el.classList.add('drag-over');
}
function tabTouchEnd(e){
  if(!_touchDragTabId)return;
  const touch=e.changedTouches[0];
  const el=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.tab-order-item');
  const targetId=el?.dataset?.tabId;
  if(targetId&&targetId!==_touchDragTabId){
    const srcDef=TAB_DEFS.find(t=>t.id===_touchDragTabId),tgtDef=TAB_DEFS.find(t=>t.id===targetId);
    if(!srcDef?.fixed&&!tgtDef?.fixed){
      const nonHomeDefs=TAB_DEFS.filter(t=>t.id!=='home');
      const order=S.tabOrder||nonHomeDefs.map(t=>t.id);
      const si=order.indexOf(_touchDragTabId),ti=order.indexOf(targetId);
      if(si>=0&&ti>=0){order.splice(si,1);order.splice(ti,0,_touchDragTabId);S.tabOrder=order;save();buildTabs();renderSettings();}
    }
  }
  document.querySelectorAll('.tab-order-item').forEach(x=>x.classList.remove('dragging','drag-over'));
  _touchDragTabId=null;_touchDragEl=null;
}
function tabDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.tab-order-item').forEach(el=>el.classList.remove('dragging','drag-over'));
  if(!_dragTabId||_dragTabId===targetId)return;
  const srcDef=TAB_DEFS.find(t=>t.id===_dragTabId),tgtDef=TAB_DEFS.find(t=>t.id===targetId);
  if(srcDef?.fixed||tgtDef?.fixed)return;
  const nonHomeDefs=TAB_DEFS.filter(t=>t.id!=='home');
  const order=S.tabOrder||nonHomeDefs.map(t=>t.id);
  const si=order.indexOf(_dragTabId),ti=order.indexOf(targetId);
  if(si<0||ti<0)return;
  order.splice(si,1);order.splice(ti,0,_dragTabId);
  S.tabOrder=order;save();buildTabs();renderSettings();
}
function toggleTabHidden(id){
  if(!S.tabHidden)S.tabHidden=[];
  const idx=S.tabHidden.indexOf(id);
  if(idx>=0)S.tabHidden.splice(idx,1);else S.tabHidden.push(id);
  if(S.tabHidden.includes(activeTab))goTab('dash');
  save();buildTabs();renderSettings();
}

function checkBackupReminder(){
  const el=document.getElementById('dash-backup-reminder');if(!el)return;
  if(!S.lastBackup||Math.floor((Date.now()-S.lastBackup)/864e5)<7){el.innerHTML='';return;}
  const days=Math.floor((Date.now()-S.lastBackup)/864e5);
  el.innerHTML=`<div class="backup-banner">⚠ 前回バックアップから <strong>${days}日</strong> 経過<button onclick="doExport()" style="background:rgba(240,156,42,0.2);border:1px solid rgba(240,156,42,0.4);border-radius:6px;color:var(--warn);cursor:pointer;font-size:12px;font-weight:700;padding:4px 9px">今すぐ</button></div>`;
}
function doExport(){
  const now=new Date();
  const ds=`${now.getFullYear()}${z2(now.getMonth()+1)}${z2(now.getDate())}_${z2(now.getHours())}${z2(now.getMinutes())}`;
  S.backupCreatedAt=`${now.getFullYear()}/${z2(now.getMonth()+1)}/${z2(now.getDate())} ${z2(now.getHours())}:${z2(now.getMinutes())}`;
  S.lastBackup=Date.now();save();
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`cardboard_backup_${ds}.json`;a.click();
  URL.revokeObjectURL(url);renderSettings();alert('バックアップを保存しました。');
}
function doImport(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.cards)throw new Error('invalid');
      if(!confirm('現在のデータをすべて上書きして復元しますか？'))return;
      S=data;save();buildTabs();renderDash();renderHome();renderSettings();alert('復元しました。');
    }catch(err){alert('ファイルが正しくありません。');}
  };
  reader.readAsText(file);event.target.value='';
}

  else if(n.includes('titan')||n.includes('チタン')){selectGrad(1);}
  else if(n.includes('gold')||n.includes('ゴールド')){selectGrad(3);}
  else if(n.includes('rose')||n.includes('ローズ')){selectGrad(4);}
  // ブランド自動選択
  if(n.includes('visa')){selectBrand('visa');}
  else if(n.includes('mastercard')||n.includes('master')){selectBrand('mastercard');}
  else if(n.includes('amex')||n.includes('american express')||n.includes('americanexpress')){selectBrand('amex');}
  else if(n.includes('jcb')){selectBrand('jcb');}
  else if(n.includes('diners')){selectBrand('diners');}

function fmtPhoneInput(el){
  let v=toHalf(el.value).replace(/[^\d]/g,'').slice(0,11);
  let out='';
  if(v.startsWith('0120')||v.startsWith('0570')||v.startsWith('0800')){
    // 0120-XXX-XXX / 0570-XXX-XXX
    if(v.length<=4)out=v;
    else if(v.length<=7)out=v.slice(0,4)+'-'+v.slice(4);
    else out=v.slice(0,4)+'-'+v.slice(4,7)+'-'+v.slice(7);
  }else if(v.startsWith('090')||v.startsWith('080')||v.startsWith('070')||v.startsWith('050')){
    // 090-XXXX-XXXX
    if(v.length<=3)out=v;
    else if(v.length<=7)out=v.slice(0,3)+'-'+v.slice(3);
    else out=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  }else if(v.startsWith('03')||v.startsWith('06')){
    // 03-XXXX-XXXX
    if(v.length<=2)out=v;
    else if(v.length<=6)out=v.slice(0,2)+'-'+v.slice(2);
    else out=v.slice(0,2)+'-'+v.slice(2,6)+'-'+v.slice(6);
  }else if(v.startsWith('0')){
    // その他市外局番4桁: 0XXX-XX-XXXX
    if(v.length<=4)out=v;
    else if(v.length<=6)out=v.slice(0,4)+'-'+v.slice(4);
    else out=v.slice(0,4)+'-'+v.slice(4,6)+'-'+v.slice(6);
  }else{
    out=v;
  }
  el.value=out;
}

    pi++;
  }

  if(!n||isNaN(cl)||isNaN(bl)){alert('カード名・締め日・引き落とし日は必須です');return;}

  const obj={name:n,brand:_cardBrand,closeDay:cl,billDay:bl,annualFee:af,annualMonth:am,note:nt,phones,gradientIdx:_gradIdx,visible:true};
  if(id){
    const c=S.cards.find(c=>c.id===id);
    if(c){const vis=c.visible;Object.assign(c,obj);c.visible=vis;}
  }else{
    S.cards.push({id:S.nxtCard++,...obj});
  }
  save();mClose();renderCards();
  if(activeTab==='home')renderHome();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
buildTabs();
checkBackupReminder();
goTab(activeTab);

</script>
