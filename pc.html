<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">


<meta name="apple-mobile-web-app-title" content="CardBoard">
<title>CardBoard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f18; --s1:#161927; --s2:#1c2030; --s3:#232740;
  --b1:rgba(255,255,255,0.07); --b2:rgba(255,255,255,0.13);
  --accent:#5b8dee; --a2:#7c5cfc;
  --ok:#27c485; --ng:#e8506a; --warn:#f09c2a;
  --text:#dde2f2; --t2:#6b748f; --t3:#363c52;
  --mono:'DM Mono',monospace; --sans:'Noto Sans JP',sans-serif;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);
  --sr:env(safe-area-inset-right,0px);
  --tbh:58px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;}
/* ── Top bar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:calc(44px + var(--st));
  padding-top:var(--st);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:calc(16px + var(--sl));
  padding-right:calc(16px + var(--sr));
  background:rgba(13,15,24,0.85);
  backdrop-filter:saturate(180%) blur(28px);
  -webkit-backdrop-filter:saturate(180%) blur(28px);
  border-bottom:1px solid rgba(255,255,255,0.07);
}
.topbar-logo{font-size:16px;font-weight:700;letter-spacing:.2px;}
.topbar-logo em{color:var(--accent);font-style:normal;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;color:var(--t2);cursor:pointer;
  font-size:16px;padding:5px 9px;line-height:1;transition:.15s;
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
/* ── Pages ── */
.pages{
  position:fixed;
  top:calc(44px + var(--st));
  bottom:calc(var(--tbh) + var(--sb));
  left:0;right:0;
  overflow:hidden;
}
.page{
  display:none;height:100%;overflow-y:auto;
  padding:12px calc(14px + var(--sr)) 12px calc(14px + var(--sl));
  -webkit-overflow-scrolling:touch;
}
.page.on{display:block;}
/* ── Bottom tabs ── */
.btabs{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:calc(var(--tbh) + var(--sb));
  padding-bottom:var(--sb);
  padding-left:var(--sl);padding-right:var(--sr);
  display:flex;
  background:rgba(13,15,24,0.85);
  backdrop-filter:saturate(180%) blur(28px);
  -webkit-backdrop-filter:saturate(180%) blur(28px);
  border-top:1px solid rgba(255,255,255,0.07);
}
.btab{
  flex:1;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;color:var(--t2);font-family:var(--sans);
  font-size:9px;font-weight:600;letter-spacing:.2px;padding:5px 2px;
  transition:color .18s;position:relative;
}
.btab.on{color:var(--accent);}
.btab-icon{font-size:19px;line-height:1;}
.btab.on::after{
  content:'';position:absolute;top:6px;
  width:38px;height:38px;border-radius:11px;
  background:rgba(91,141,238,0.12);border:1px solid rgba(91,141,238,0.2);
  z-index:-1;
}
/* ── Tutorial banner ── */
.tutorial-banner{
  background:linear-gradient(135deg,rgba(91,141,238,0.15),rgba(124,92,252,0.15));
  border:1px solid rgba(91,141,238,0.3);border-radius:12px;
  padding:12px 14px;margin-bottom:12px;
}
.tutorial-banner-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.tutorial-banner-body{font-size:12px;color:var(--t2);line-height:1.6;}
.tutorial-banner-close{
  display:flex;justify-content:flex-end;margin-top:8px;
}
/* ── Backup reminder ── */
.backup-banner{
  background:rgba(240,156,42,0.12);border:1px solid rgba(240,156,42,0.3);
  border-radius:10px;padding:9px 13px;margin-bottom:10px;
  font-size:12px;color:var(--warn);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
/* ── Month switcher ── */
.month-sw{
  display:flex;gap:3px;background:var(--s2);border-radius:11px;
  padding:3px;margin-bottom:12px;border:1px solid var(--b1);
}
.msw-btn{
  flex:1;background:none;border:none;cursor:pointer;
  font-family:var(--sans);font-size:12px;font-weight:600;
  color:var(--t2);padding:8px 6px;border-radius:8px;
  transition:.18s;text-align:center;
}
.msw-btn.on{background:var(--s3);color:var(--text);box-shadow:0 1px 6px #0005;}
.msw-btn.on.cur{color:var(--accent);}
.msw-btn.on.nxt{color:var(--a2);}
/* ── Hero card ── */
.hero{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:16px;padding:16px;margin-bottom:12px;
}
.hero-lbl{font-size:10px;color:var(--t2);letter-spacing:.4px;margin-bottom:5px;}
.hero-val{font-family:var(--mono);font-size:32px;font-weight:500;letter-spacing:-1px;line-height:1;}
.hero-val.ok{color:var(--ok);}
.hero-val.warn{color:var(--warn);}
.hero-val.ng{color:var(--ng);}
.hero-sub{font-size:11px;color:var(--t2);margin-top:4px;}
.hero-pills{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--b1);}
.hero-pill{flex:1;background:var(--s2);border-radius:10px;padding:10px 12px;border:1px solid var(--b1);}
.hero-pill-lbl{font-size:9px;color:var(--t2);margin-bottom:3px;letter-spacing:.3px;}
.hero-pill-val{font-family:var(--mono);font-size:14px;font-weight:500;}
.hero-pill-val.pos{color:var(--ok);}
.hero-pill-val.neg{color:var(--ng);}
/* ── Section ── */
.sec{margin-bottom:12px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.sec-title{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.6px;text-transform:uppercase;}
/* ── Glass block ── */
.gb{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;}
/* ── Row ── */
.row{
  display:flex;align-items:center;gap:9px;
  padding:10px 13px;border-bottom:1px solid rgba(255,255,255,0.04);
  transition:background .1s;
}
.row:last-child{border-bottom:none;}
.row-drag{cursor:grab;color:var(--t3);font-size:13px;flex-shrink:0;}
.row-lbl{flex:1;font-size:13px;}
.row-lbl.done{color:var(--t2);text-decoration:line-through;}
.row-val{font-family:var(--mono);font-size:13px;}
.row-val.pos{color:var(--ok);}
.row-val.neg{color:var(--ng);}
.row-val.zero{color:var(--t3);}
.row-val.tap{cursor:pointer;border-radius:6px;padding:2px 6px;transition:.1s;}
.row-val.tap:hover{background:rgba(91,141,238,0.12);color:var(--accent);}
.row-edit{
  background:none;border:1px solid var(--b2);border-radius:6px;
  color:var(--t2);cursor:pointer;font-size:10px;padding:3px 7px;flex-shrink:0;transition:.15s;
}
.row-edit:hover{border-color:var(--accent);color:var(--accent);}
.chk{
  width:20px;height:20px;border-radius:6px;border:1.5px solid var(--b2);
  background:none;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:.15s;
}
.chk.on{background:var(--ok);border-color:var(--ok);color:#fff;}
.rdel{background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;padding:0 2px;flex-shrink:0;transition:.15s;}
.rdel:hover{color:var(--ng);}
.add-strip{display:flex;gap:6px;padding:8px 13px;border-top:1px solid rgba(255,255,255,0.04);}
.add-pill{
  background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.1);
  border-radius:7px;color:var(--t2);cursor:pointer;
  font-family:var(--sans);font-size:11px;padding:5px 9px;transition:.15s;
}
.add-pill:hover{border-color:var(--accent);color:var(--accent);}
/* ── Section divider label ── */
.sec-divider{
  font-size:9px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.8px;
  padding:6px 13px 4px;background:var(--s2);
  border-bottom:1px solid rgba(255,255,255,0.04);
}
/* ── Card accordion ── */
.cacc-head{
  display:flex;align-items:center;gap:8px;
  padding:10px 13px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.04);transition:background .1s;
}
.cacc-head:last-child{border-bottom:none;}
.cacc-name{flex:1;font-size:13px;font-weight:500;}
.cacc-date{font-size:10px;color:var(--t2);font-family:var(--mono);white-space:nowrap;}
.cacc-date.soon{color:var(--warn);}
.cacc-date.tod{color:var(--ng);font-weight:700;}
.cacc-amt{font-family:var(--mono);font-size:13px;min-width:68px;text-align:right;}
.cacc-amt.zero{color:var(--t3);}
.cacc-chev{font-size:10px;color:var(--t2);transition:transform .2s;flex-shrink:0;}
.cacc-chev.open{transform:rotate(180deg);}
.cacc-body{
  display:none;padding:8px 13px 11px;
  background:rgba(0,0,0,0.18);
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.cacc-body.open{display:block;}
.cacc-meta{font-size:11px;color:var(--t2);margin-bottom:7px;line-height:1.8;}
.cacc-edit{display:flex;gap:7px;margin-top:6px;}
.cacc-input{
  flex:1;background:var(--bg);border:1px solid var(--b2);
  border-radius:8px;color:var(--text);font-family:var(--mono);
  font-size:14px;padding:7px 10px;outline:none;transition:.15s;-webkit-appearance:none;
}
.cacc-input:focus{border-color:var(--accent);}
.cacc-save{
  background:var(--accent);border:none;border-radius:8px;
  color:#fff;cursor:pointer;font-family:var(--sans);
  font-size:12px;font-weight:700;padding:7px 12px;transition:.15s;
}
.ann-badge{
  font-size:9px;background:rgba(240,156,42,0.15);color:var(--warn);
  border:1px solid rgba(240,156,42,0.25);border-radius:4px;padding:1px 5px;flex-shrink:0;
}
/* ── Net bar ── */
.net-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 13px;
  background:rgba(31,35,53,0.7);border:1px solid var(--b1);
  border-radius:0 0 14px 14px;border-top:none;margin-top:-1px;
}
.net-lbl{font-size:11px;color:var(--t2);}
.net-val{font-family:var(--mono);font-size:15px;font-weight:600;}
.net-val.ok{color:var(--ok);}
.net-val.warn{color:var(--warn);}
.net-val.ng{color:var(--ng);}
/* ── Calendar ── */
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.cal-nav h2{font-size:15px;font-weight:700;flex:1;text-align:center;}
.cal-nav-btn{
  background:var(--s2);border:1px solid var(--b1);border-radius:8px;
  color:var(--t2);cursor:pointer;font-size:16px;padding:5px 11px;line-height:1;transition:.15s;
}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.cal-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--s2);border-bottom:1px solid var(--b1);}
.cal-dow{padding:6px 2px;text-align:center;font-size:10px;font-weight:700;letter-spacing:.3px;color:var(--t2);}
.cal-dow.sun{color:#ff7088;}
.cal-dow.sat{color:var(--accent);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.ccell{
  border-right:1px solid rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.04);
  min-height:66px;padding:4px 3px;
}
.ccell:nth-child(7n){border-right:none;}
.ccell.dim{opacity:.22;}
.ccell.today{background:rgba(91,141,238,0.06);}
.cday{font-size:11px;font-weight:700;font-family:var(--mono);margin-bottom:2px;}
.ccell.csun .cday,.ccell.chol .cday{color:#ff7088;}
.ccell.csat .cday{color:var(--accent);}
.holnm{font-size:8px;color:#ff7088;line-height:1;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cchip{font-size:9px;border-radius:3px;padding:1px 3px;margin-bottom:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cchip.bill{background:rgba(232,80,106,0.18);color:#ff8098;border-left:2px solid var(--ng);}
.cchip.inc{background:rgba(39,196,133,0.15);color:#52e0a4;border-left:2px solid var(--ok);}
.cchip.io{background:rgba(124,92,252,0.15);color:#b8a4ff;border-left:2px solid var(--a2);}
.cchip.ann{background:rgba(240,156,42,0.15);color:#ffc060;border-left:2px solid var(--warn);}
.cal-legend{display:flex;gap:9px;padding:8px 13px;border-top:1px solid var(--b1);flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--t2);}
.leg-dot{width:7px;height:7px;border-radius:2px;}
/* Calendar pie */
.cal-pie-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:12px;}
.cal-pie-title{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;}
.cal-pie-inner{display:flex;gap:12px;align-items:center;}
.cal-pie-canvas-wrap{position:relative;width:130px;height:130px;flex-shrink:0;}
.cal-pie-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.cal-pie-center-lbl{font-size:9px;color:var(--t2);}
.cal-pie-center-val{font-family:var(--mono);font-size:13px;font-weight:500;}
.pie-leg-row{display:flex;align-items:center;gap:5px;margin-bottom:4px;overflow:hidden;}
.pie-leg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.pie-leg-name{font-size:11px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pie-leg-val{font-family:var(--mono);font-size:10px;color:var(--t2);flex-shrink:0;}
/* ── Stats tabs ── */
.stat-tabs{display:flex;gap:3px;background:var(--s2);border-radius:10px;padding:3px;margin-bottom:12px;border:1px solid var(--b1);}
.stat-tab{flex:1;background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--t2);padding:7px 4px;border-radius:7px;transition:.15s;text-align:center;}
.stat-tab.on{background:var(--s3);color:var(--text);box-shadow:0 1px 6px #0005;}
.stat-period-bar{display:flex;gap:3px;background:var(--s2);border-radius:8px;padding:3px;margin-bottom:10px;border:1px solid var(--b1);}
.spill{flex:1;background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:11px;font-weight:600;color:var(--t2);padding:6px 4px;border-radius:6px;transition:.15s;text-align:center;}
.spill.on{background:var(--s3);color:var(--text);box-shadow:0 1px 5px #0004;}
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:12px;margin-bottom:10px;}
.stat-sec-title{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px;}
/* ── Mission tab ── */
.mission-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.mission-head{padding:12px 13px 8px;}
.mission-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.mission-meta{font-size:11px;color:var(--t2);}
.mission-progress-wrap{padding:0 13px 12px;}
.mission-bar-bg{background:var(--s3);border-radius:6px;height:8px;overflow:hidden;margin-bottom:6px;}
.mission-bar-fill{height:100%;border-radius:6px;transition:width .4s;}
.mission-bar-fill.ok{background:linear-gradient(90deg,var(--ok),#52e0a4);}
.mission-bar-fill.warn{background:linear-gradient(90deg,var(--warn),#ffc060);}
.mission-bar-fill.ng{background:linear-gradient(90deg,var(--ng),#ff8098);}
.mission-nums{display:flex;justify-content:space-between;font-size:11px;}
.mission-cur{font-family:var(--mono);font-weight:600;}
.mission-goal{font-family:var(--mono);color:var(--t2);}
.mission-pct{font-size:10px;color:var(--t2);}
.mission-add-btn{
  width:100%;background:rgba(91,141,238,0.1);border:1px dashed rgba(91,141,238,0.3);
  border-radius:12px;color:var(--accent);cursor:pointer;font-family:var(--sans);
  font-size:13px;font-weight:600;padding:12px;margin-bottom:10px;transition:.15s;
}
.mission-add-btn:hover{background:rgba(91,141,238,0.18);}
/* ── Settings ── */
.st-wrap{padding-bottom:8px;}
.st-sec{margin-bottom:18px;}
.st-sec-title{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.st-row{
  display:flex;align-items:center;gap:10px;
  background:var(--s2);border:1px solid var(--b1);
  border-radius:10px;padding:11px 12px;margin-bottom:6px;
  cursor:pointer;transition:.15s;
}
.st-row:hover{border-color:var(--b2);}
.st-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;}
.st-body{flex:1;}
.st-lbl{font-size:13px;font-weight:500;}
.st-sub{font-size:11px;color:var(--t2);margin-top:2px;}
.st-arr{color:var(--t2);font-size:16px;}
.st-hint{font-size:11px;color:var(--t3);margin-bottom:6px;}
.tab-order-item{
  display:flex;align-items:center;gap:9px;
  background:var(--s2);border:1px solid var(--b1);border-radius:10px;
  padding:10px 12px;margin-bottom:6px;cursor:grab;user-select:none;transition:.15s;
}
.tab-order-item.dragging{opacity:.4;border-color:var(--accent);}
.tab-order-item.drag-over{border-color:var(--accent);background:var(--s3);}
.tab-order-handle{color:var(--t2);font-size:13px;flex-shrink:0;}
.tab-order-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center;}
.tab-order-name{flex:1;font-size:13px;font-weight:500;}
/* Author banner */
.author-banner{
  background:linear-gradient(135deg,rgba(91,141,238,0.1),rgba(124,92,252,0.1));
  border:1px solid rgba(91,141,238,0.2);border-radius:12px;
  padding:14px;text-align:center;margin-bottom:6px;cursor:pointer;transition:.15s;
}
.author-banner:hover{border-color:rgba(91,141,238,0.4);}
.author-banner-name{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:3px;}
.author-banner-x{font-size:12px;color:var(--t2);}
/* ── Modal ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:500;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
@media(min-width:500px){.ov{align-items:center;}}
.modal{
  background:rgba(18,21,34,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);border-radius:20px 20px 0 0;
  padding:6px 16px calc(16px + var(--sb));
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto;
}
@media(min-width:500px){.modal{border-radius:20px;padding:18px;}}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.14);border-radius:2px;margin:12px auto 16px;}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;}
.frow{margin-bottom:11px;}
.flbl{display:block;font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}

<script>
// ═══════════════════════════════════════════
// CONSTANTS & DATA
// ═══════════════════════════════════════════
const SK = 'cb6';
const CARD_COLORS = ['#5b8dee','#7c5cfc','#27c485','#e8506a','#f09c2a','#e060d0','#40c8e0','#a0d040','#f06090','#80a0ff','#ffb040'];

const TAB_DEFS = [
  {id:'dash',    icon:'⊞', label:'ダッシュボード', fixed:true},
  {id:'cal',     icon:'◫', label:'カレンダー'},
  {id:'stats',   icon:'◈', label:'統計'},
  {id:'mission', icon:'◉', label:'修行'},
];

// month data schema:
// { ym, balance, items:[{id,label,amount,checked,isFixed,order}], cardAmounts:{} }
// items: isFixed=true → 毎月固定（翌月へ引き継ぎ）, isFixed=false → 当月のみ
// balance of next month auto-calculated from prev

const DEMO_CARDS = [
  {id:1,  name:'AMEX PLTAINUM',         closeDay:19, billDay:10, annualFee:165000, annualMonth:2,  annualDay:10, note:'メイン',             visible:true},
  {id:2,  name:'LUXURY CARD BLACK',     closeDay:5,  billDay:27, annualFee:55000,  annualMonth:9,  annualDay:27, note:'サブサブ',           visible:true},
  {id:3,  name:'JCB THE CLASS',         closeDay:15, billDay:10, annualFee:55000,  annualMonth:2,  annualDay:10, note:'サブ（オンライン）', visible:true},
  {id:4,  name:'JCB THE CLASS (Metal)', closeDay:15, billDay:10, annualFee:33000,  annualMonth:2,  annualDay:10, note:'メタルカード',       visible:false},
  {id:5,  name:'ANA Diners SFC',        closeDay:15, billDay:10, annualFee:30800,  annualMonth:11, annualDay:10, note:'ANA用',             visible:true},
  {id:6,  name:'JAL CARD Suica',        closeDay:5,  billDay:4,  annualFee:7700,   annualMonth:5,  annualDay:4,  note:'JAL・JR用',         visible:true},
  {id:7,  name:'YumeNavi CARD',         closeDay:15, billDay:10, annualFee:0,      annualMonth:4,  annualDay:15, note:'ポイント移行用',     visible:true},
  {id:8,  name:'SMCC GOLD NL',          closeDay:15, billDay:10, annualFee:0,      annualMonth:0,  annualDay:0,  note:'コンビニ・積立NISA', visible:true},
  {id:9,  name:'EPOS GOLD',             closeDay:5,  billDay:4,  annualFee:0,      annualMonth:0,  annualDay:0,  note:'保険料払い',         visible:true},
  {id:10, name:'SAISON GOLD Premium',   closeDay:10, billDay:4,  annualFee:0,      annualMonth:0,  annualDay:0,  note:'',                  visible:true},
  {id:11, name:'PayPay CARD',           closeDay:99, billDay:27, annualFee:0,      annualMonth:0,  annualDay:0,  note:'PayPay用',          visible:true},
];

// missions: [{id, cardId, label, goalAmount, startDate, endDate}]

function mkMonth(ymStr) {
  return {ym:ymStr, balance:0, items:[], cardAmounts:{}};
}

function getDisplayYms() {
  const d=new Date(), y=d.getFullYear(), m=d.getMonth()+1;
  return [ym(y,m), ym(m===12?y+1:y, m===12?1:m+1)];
}
function ym(y,m){ return `${y}-${z2(m)}`; }

function loadState() {
  try { const r=localStorage.getItem(SK); if(r) return JSON.parse(r); } catch(e){}
  // Demo seed
  const [y0,y1] = getDisplayYms();
  const m0 = mkMonth(y0);
  m0.balance = 9999000;
  m0.items = [
    {id:1, label:'給与',     amount:280000, checked:false, isFixed:true,  order:0},
    {id:2, label:'積立NISA', amount:-100000,checked:false, isFixed:true,  order:1},
    {id:3, label:'iDeCo',    amount:-23000, checked:false, isFixed:true,  order:2},
    {id:4, label:'純金積立', amount:-3000,  checked:false, isFixed:true,  order:3},
  ];
  m0.cardAmounts = {1:38000,2:0,3:45000,4:0,5:1234,6:12345,7:0,8:6789,9:4321,10:440,11:3210};
  const m1 = mkMonth(y1);
  // balance of m1 will be auto-calculated
  m1.items = [
    {id:1, label:'給与',     amount:280000, checked:false, isFixed:true,  order:0},
    {id:2, label:'積立NISA', amount:-100000,checked:false, isFixed:true,  order:1},
    {id:3, label:'iDeCo',    amount:-23000, checked:false, isFixed:true,  order:2},
    {id:4, label:'純金積立', amount:-3000,  checked:false, isFixed:true,  order:3},
  ];
  return {
    cards: DEMO_CARDS,
    months: {[y0]:m0, [y1]:m1},
    missions: [],
    nxtCard:12, nxtItem:10, nxtMission:1,
    tabOrder: TAB_DEFS.map(t=>t.id),
    firstLaunch: true,
    lastBackup: null,
    backupCreatedAt: null,
  };
}
function save(){ localStorage.setItem(SK, JSON.stringify(S)); }
let S = loadState();

function getMD(ymStr) {
  if(!S.months[ymStr]) S.months[ymStr]=mkMonth(ymStr);
  return S.months[ymStr];
}

// 翌月balanceを自動計算（前月の引き落とし後残高）
function syncNextMonthBalance() {
  const [y0,y1] = getDisplayYms();
  const md0 = getMD(y0);
  const net = calcNet(y0);
  const md1 = getMD(y1);
  // 翌月に固定項目をコピー（存在しない場合）
  const fixedFromPrev = md0.items.filter(it=>it.isFixed);
  if(md1.items.length === 0) {
    md1.items = fixedFromPrev.map(it=>({...it, checked:false}));
  } else {
    // 固定項目のみ同期（当月項目は触らない）
    fixedFromPrev.forEach(src => {
      const exists = md1.items.find(it=>it.id===src.id&&it.isFixed);
      if(!exists) md1.items.push({...src, checked:false});
    });
  }
  md1.balance = Math.max(0, net); // 引き落とし後残高を翌月月初残高に
}

// ═══════════════════════════════════════════
// HOLIDAYS
// ═══════════════════════════════════════════
const HL={
  '2025-01-01':'元日','2025-01-13':'成人の日','2025-02-11':'建国記念日',
  '2025-02-23':'天皇誕生日','2025-02-24':'振替休日','2025-03-20':'春分の日',
  '2025-04-29':'昭和の日','2025-05-03':'憲法記念日','2025-05-04':'みどりの日',
  '2025-05-05':'こどもの日','2025-05-06':'振替休日','2025-07-21':'海の日',
  '2025-08-11':'山の日','2025-09-15':'敬老の日','2025-09-23':'秋分の日',
  '2025-10-13':'スポーツの日','2025-11-03':'文化の日','2025-11-23':'勤労感謝の日',
  '2025-11-24':'振替休日',
  '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念日',
  '2026-02-23':'天皇誕生日','2026-03-20':'春分の日','2026-04-29':'昭和の日',
  '2026-05-03':'憲法記念日','2026-05-04':'みどりの日','2026-05-05':'こどもの日',
  '2026-05-06':'振替休日','2026-07-20':'海の日','2026-08-11':'山の日',
  '2026-09-21':'敬老の日','2026-09-22':'秋分の日','2026-10-12':'スポーツの日',
  '2026-11-03':'文化の日','2026-11-23':'勤労感謝の日',
};
function fmtD(d){ return `${d.getFullYear()}-${z2(d.getMonth()+1)}-${z2(d.getDate())}`; }
function isHL(d){ return HL[fmtD(d)]||null; }
function isNBD(d){ const w=d.getDay(); return w===0||w===6||!!isHL(d); }
function nextBiz(y,m,day){
  let d=new Date(y,m-1,day);
  while(isNBD(d)) d=new Date(d.getTime()+864e5);
  return d;
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function z2(n){ return String(n).padStart(2,'0'); }
function fy(n){ if(isNaN(n)||n==null) return '¥0'; const a=Math.abs(Math.round(n)); return (n<0?'-¥':'¥')+a.toLocaleString('ja-JP'); }
function ymLbl(y){ const[yr,mo]=y.split('-'); return `${yr}年${parseInt(mo)}月`; }
function todayStr(){ return fmtD(new Date()); }

function calcAssets(ymStr) {
  const md = getMD(ymStr);
  const checkedAmt = (md.items||[]).filter(it=>it.checked).reduce((s,it)=>s+it.amount,0);
  return (md.balance||0) + checkedAmt;
}
function calcLiab(ymStr) {
  const md = getMD(ymStr);
  const [,m] = ymStr.split('-').map(Number);
  const vis = S.cards.filter(c=>c.visible);
  const cardTot = vis.reduce((s,c)=>s+(md.cardAmounts[c.id]||0),0);
  const annTot = vis.filter(c=>c.annualFee>0&&c.annualMonth===m).reduce((s,c)=>s+c.annualFee,0);
  return cardTot + annTot;
}
function calcNet(ymStr){ return calcAssets(ymStr) - calcLiab(ymStr); }

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
let activeTab = 'dash';

function buildTabs() {
  const order = (S.tabOrder||TAB_DEFS.map(t=>t.id));
  const defs = order.map(id=>TAB_DEFS.find(t=>t.id===id)).filter(Boolean);
  TAB_DEFS.forEach(t=>{ if(!defs.find(d=>d.id===t.id)) defs.push(t); });
  document.getElementById('btabs').innerHTML = defs.map(t =>
    `<button class="btab${t.id===activeTab?' on':''}" data-tab="${t.id}" onclick="goTab('${t.id}',this)">
      <span class="btab-icon">${t.icon}</span><span>${t.label}</span>
    </button>`
  ).join('');
}

function goTab(id, el) {
  activeTab = id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.btab').forEach(t=>t.classList.remove('on'));
  const pg = document.getElementById('pg-'+id);
  if(pg) pg.classList.add('on');
  if(el) el.classList.add('on');
  else { const b=document.querySelector(`.btab[data-tab="${id}"]`); if(b) b.classList.add('on'); }
  if(id==='dash')     renderDash();
  if(id==='cal')      renderCal();
  if(id==='stats')    renderStats();
  if(id==='mission')  renderMission();
  if(id==='settings') renderSettingsPage();
}


// ═══════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════
let dashIdx = 0;

function switchMonth(idx) {
  dashIdx = idx;
  document.getElementById('msw0').classList.toggle('on', idx===0);
  document.getElementById('msw1').classList.toggle('on', idx===1);
  renderDash();
}

function renderDash() {
  syncNextMonthBalance();
  const yms = getDisplayYms();
  document.getElementById('msw0').textContent = ymLbl(yms[0]);
  document.getElementById('msw1').textContent = ymLbl(yms[1]);
  document.getElementById('msw0').classList.toggle('on', dashIdx===0);
  document.getElementById('msw1').classList.toggle('on', dashIdx===1);

  const ymStr = yms[dashIdx];
  const md = getMD(ymStr);
  const [y,m] = ymStr.split('-').map(Number);
  const vis = S.cards.filter(c=>c.visible);
  const assets = calcAssets(ymStr);
  const liab = calcLiab(ymStr);
  const net = assets - liab;
  const netCls = net>=0?'ok':net>=-50000?'warn':'ng';
  const ts = todayStr();
  const annuals = vis.filter(c=>c.annualFee>0&&c.annualMonth===m);

  // Tutorial
  const tutEl = document.getElementById('dash-tutorial');
  if(S.firstLaunch) {
    tutEl.innerHTML = `<div class="tutorial-banner">
      <div class="tutorial-banner-title">🎉 CardBoardへようこそ</div>
      <div class="tutorial-banner-body">
        デモデータが入っています。<br>
        ① 口座残高の「編集」で実際の残高を入力<br>
        ② 各カードをタップして今月の利用額を入力<br>
        ③ 固定項目のチェックで残高に反映されます
      </div>
      <div class="tutorial-banner-close" style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-sm btn-g" onclick="dismissTutorial(true)">デモデータを消してはじめる</button>
        <button class="btn btn-sm btn-p" onclick="dismissTutorial(false)">そのままはじめる</button>
      </div>
    </div>`;
  } else { tutEl.innerHTML = ''; }

  // items sorted by order
  const sortedItems = [...(md.items||[])].sort((a,b)=>(a.order||0)-(b.order||0));
  const fixedItems = sortedItems.filter(it=>it.isFixed);
  const otherItems = sortedItems.filter(it=>!it.isFixed);

  // Card rows
  const cardRows = vis.map(c => {
    const amt = md.cardAmounts[c.id]||0;
    const raw = c.billDay===99?new Date(y,m,0).getDate():c.billDay;
    const act = nextBiz(y,m,raw);
    const diff = (act-new Date(ts))/864e5;
    let dc='cacc-date';
    if(diff>=0&&diff<1) dc+=' tod'; else if(diff>=0&&diff<=5) dc+=' soon';
    const shifted = fmtD(act)!==`${y}-${z2(m)}-${z2(raw)}`;
    const ann = annuals.find(a=>a.id===c.id);
    return `
    <div class="cacc-head" onclick="toggleAcc(${c.id})">
      <span class="cacc-name">${c.name}</span>
      ${ann?`<span class="ann-badge">年会費 ${fy(ann.annualFee)}</span>`:''}
      <span class="${dc}">${m}/${act.getDate()}${shifted?'*':''}</span>
      <span class="cacc-amt${amt===0?' zero':''}">${amt===0?'—':fy(amt)}</span>
      <span class="cacc-chev" id="chev-${c.id}">▾</span>
    </div>
    <div class="cacc-body" id="acc-${c.id}">
      <div class="cacc-meta">締め日 ${c.closeDay===99?'末日':c.closeDay+'日'} ／ 引落 ${m}/${act.getDate()}日${shifted?' (振替)':''}</div>
      <div class="cacc-edit">
        <input class="cacc-input" id="ci-${c.id}" type="number" value="${amt}" placeholder="利用額を入力">
        <button class="cacc-save" onclick="saveAmt('${ymStr}',${c.id})">保存</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('dash-body').innerHTML = `
    <div class="hero">
      <div class="hero-lbl">引き落とし後の予測残高</div>
      <div class="hero-val ${netCls}">${fy(net)}</div>
      <div class="hero-sub">${net>=0?'問題なし':'⚠ 残高不足の可能性あり'}</div>
      <div class="hero-pills">
        <div class="hero-pill">
          <div class="hero-pill-lbl">残高合計</div>
          <div class="hero-pill-val pos">${fy(assets)}</div>
        </div>
        <div class="hero-pill">
          <div class="hero-pill-lbl">引き落とし合計</div>
          <div class="hero-pill-val neg">${fy(liab)}</div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-head"><span class="sec-title">残高・収支</span></div>
      <div class="gb">
        <div class="row">
          <span class="row-lbl">口座残高</span>

let calYm=(()=>{ const d=new Date(); return ym(d.getFullYear(),d.getMonth()+1); })();
const _calCharts={};

function calMove(d){ let[y,m]=calYm.split('-').map(Number); m+=d; if(m>12){m=1;y++;} if(m<1){m=12;y--;} calYm=ym(y,m); renderCal(); }

function renderCal() {
  document.getElementById('cal-lbl').textContent = ymLbl(calYm);
  const [y,m]=calYm.split('-').map(Number), md=getMD(calYm);

  const ev={};
  function add(ds,e){ if(!ev[ds])ev[ds]=[]; ev[ds].push(e); }

  // billing grouped by date
  const billByDate={};
  S.cards.filter(c=>c.visible).forEach(c=>{
    const raw=c.billDay===99?new Date(y,m,0).getDate():c.billDay;
    const ds=fmtD(nextBiz(y,m,raw));
    billByDate[ds]=(billByDate[ds]||0)+(md.cardAmounts[c.id]||0);
  });
  Object.entries(billByDate).forEach(([ds,t])=>{ if(t>0) add(ds,{cls:'bill',lbl:`引き落とし ${fy(t)}`}); });

  // annuals
  S.cards.filter(c=>c.visible&&c.annualFee>0&&c.annualMonth===m).forEach(c=>{
    add(fmtD(nextBiz(y,m,c.annualDay)),{cls:'ann',lbl:`年会費 ${fy(c.annualFee)}`});
  });
  // items with checked → income/expense events on 1st / 25th
  (md.items||[]).forEach(it=>{
    const day = it.amount>0 ? 25 : 1;
    add(fmtD(nextBiz(y,m,day)),{cls:it.amount>0?'inc':'io',lbl:`${it.label} ${fy(it.amount)}`});
  });

  const fd=new Date(y,m-1,1).getDay(), dim=new Date(y,m,0).getDate(), pd=new Date(y,m-1,0).getDate();
  let html='';
  for(let i=fd-1;i>=0;i--) html+=ccell(new Date(y,m-2,pd-i),true,ev);
  for(let d=1;d<=dim;d++) html+=ccell(new Date(y,m-1,d),false,ev);
  const rem=(7-((fd+dim)%7))%7;
  for(let i=1;i<=rem;i++) html+=ccell(new Date(y,m,i),true,ev);
  document.getElementById('cal-grid').innerHTML=html;

  // Pie chart
  renderCalPie(ymStr=calYm);
}

function ccell(d,dim,ev){
  const ds=fmtD(d),dw=d.getDay(),hol=isHL(d),today=ds===todayStr();
  let cls='ccell';
  if(dim) cls+=' dim'; if(today) cls+=' today';
  if(dw===0||hol) cls+=' csun'; else if(dw===6) cls+=' csat';
  if(hol) cls+=' chol';
  const chips=(ev[ds]||[]).map(e=>`<div class="cchip ${e.cls}">${e.lbl}</div>`).join('');
  const holN=hol?`<div class="holnm">${hol}</div>`:'';
  return `<div class="${cls}"><div class="cday">${d.getDate()}</div>${holN}${chips}</div>`;
}

function renderCalPie(ymStr) {
  const [,m]=ymStr.split('-').map(Number);
  const md=getMD(ymStr);
  document.getElementById('cal-pie-title').textContent = `${ymLbl(ymStr)} カード別利用額`;
  const vis=S.cards.filter(c=>c.visible);
  const entries=vis.map((c,i)=>({
    name:c.name,
    amt:(md.cardAmounts[c.id]||0)+(c.annualFee>0&&c.annualMonth===m?c.annualFee:0),
    color:CARD_COLORS[i%CARD_COLORS.length]
  })).filter(e=>e.amt>0);
  const total=entries.reduce((s,e)=>s+e.amt,0);
  document.getElementById('cal-pie-total').textContent=fy(total);
  const ctx=document.getElementById('cal-pie-canvas').getContext('2d');
  if(_calCharts.pie){_calCharts.pie.destroy();}
  if(!entries.length){
    document.getElementById('cal-pie-legend').innerHTML='<div class="empty">データなし</div>';
    return;
  }
  _calCharts.pie=new Chart(ctx,{
    type:'doughnut',
    data:{labels:entries.map(e=>e.name),datasets:[{data:entries.map(e=>e.amt),backgroundColor:entries.map(e=>e.color),borderWidth:2,borderColor:'#161927',hoverOffset:5}]},
    options:{cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${fy(ctx.parsed)} (${Math.round(ctx.parsed/total*100)}%)`}}},animation:{duration:400}}
  });
  document.getElementById('cal-pie-legend').innerHTML=entries.slice(0,8).map(e=>
    `<div class="pie-leg-row"><div class="pie-leg-dot" style="background:${e.color}"></div><span class="pie-leg-name">${e.name}</span><span class="pie-leg-val">${fy(e.amt)}</span></div>`
  ).join('');
}

function getStatYms(n){
  const now=new Date(), res=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    res.push(ym(d.getFullYear(),d.getMonth()+1));
  }
  return res;
}

function getCardTotalForYm(ymStr){
  const md=getMD(ymStr),[,m]=ymStr.split('-').map(Number);
  const vis=S.cards.filter(c=>c.visible);
  return vis.reduce((s,c)=>s+(md.cardAmounts[c.id]||0),0)+vis.filter(c=>c.annualFee>0&&c.annualMonth===m).reduce((s,c)=>s+c.annualFee,0);
}

function chartBaseOpts(yShorten=true){
  return {
    responsive:true,maintainAspectRatio:true,animation:{duration:350},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(18,21,34,0.95)',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#dde2f2',bodyColor:'#dde2f2',padding:9}},
    scales:{
      x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b748f',font:{size:10,family:"'Noto Sans JP'"}}},
      y:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#6b748f',font:{size:10,family:"'DM Mono'"},callback:v=>yShorten?(Math.abs(v)>=10000?(v/10000).toFixed(0)+'万':fy(v)):fy(v)}}
    }
  };
}
function destroyChart(id){ if(_stCharts[id]){_stCharts[id].destroy();delete _stCharts[id];} }

function drawMonthlyBar(yms){
  destroyChart('sc-monthly');
  const ctx=document.getElementById('sc-monthly'); if(!ctx) return;
  const labels=yms.map(y=>{const[,m]=y.split('-');return parseInt(m)+'月';});
  const data=yms.map(y=>getCardTotalForYm(y));
  _stCharts['sc-monthly']=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data,backgroundColor:yms.map((_,i)=>i===yms.length-1?'rgba(91,141,238,0.85)':'rgba(91,141,238,0.35)'),borderRadius:5,borderSkipped:false}]},options:{...chartBaseOpts(),plugins:{...chartBaseOpts().plugins,tooltip:{...chartBaseOpts().plugins.tooltip,callbacks:{label:c=>` ${fy(c.parsed.y)}`}}}}});
}

function drawBalanceLine(yms){
  destroyChart('sc-balance');
  const ctx=document.getElementById('sc-balance'); if(!ctx) return;
  const labels=yms.map(y=>{const[,m]=y.split('-');return parseInt(m)+'月';});
  const data=yms.map(y=>calcNet(y));
  const opts=chartBaseOpts();
  opts.scales.y.beginAtZero=false;
  opts.plugins.tooltip.callbacks={label:c=>` ${fy(c.parsed.y)}`};
  _stCharts['sc-balance']=new Chart(ctx,{type:'line',data:{labels,datasets:[{data,borderColor:'#27c485',backgroundColor:'rgba(39,196,133,0.07)',fill:true,tension:0.4,pointBackgroundColor:data.map(v=>v<0?'#e8506a':'#27c485'),pointRadius:4,borderWidth:2}]},options:opts});
}

function drawStacked(yms){
  destroyChart('sc-stacked');
  const ctx=document.getElementById('sc-stacked'); if(!ctx) return;
  const labels=yms.map(y=>{const[,m]=y.split('-');return parseInt(m)+'月';});
  const vis=S.cards.filter(c=>c.visible);
  const datasets=vis.map((c,i)=>{
    const data=yms.map(y=>{const md=getMD(y),[,m]=y.split('-').map(Number);return(md.cardAmounts[c.id]||0)+(c.annualFee>0&&c.annualMonth===m?c.annualFee:0);});
    if(data.every(v=>v===0)) return null;
    return{label:c.name,data,backgroundColor:CARD_COLORS[i%CARD_COLORS.length]+'cc',borderRadius:3,borderSkipped:false};
  }).filter(Boolean);
  const opts=chartBaseOpts();
  opts.scales.x.stacked=true; opts.scales.y.stacked=true;
  opts.plugins.legend={display:true,position:'bottom',labels:{color:'#6b748f',font:{size:9,family:"'Noto Sans JP'"},boxWidth:9,boxHeight:9,padding:7}};
  opts.plugins.tooltip.callbacks={label:c=>` ${c.dataset.label}: ${fy(c.parsed.y)}`};
  _stCharts['sc-stacked']=new Chart(ctx,{type:'bar',data:{labels,datasets},options:opts});
}

function renderMission(){
  const body=document.getElementById('mission-body');
  let html=`<button class="mission-add-btn" onclick="openModal('addMission')">＋ 修行を追加</button>`;
  if(!S.missions||!S.missions.length){
    html+=`<div class="empty" style="margin-top:20px">修行が登録されていません<br><small style="color:var(--t3)">カードごとに目標金額と期間を設定できます</small></div>`;
  } else {
    S.missions.forEach(ms=>{
      const card=S.cards.find(c=>c.id===ms.cardId);
      const current=calcMissionProgress(ms);
      const pct=Math.min(100,Math.round(current/ms.goalAmount*100));
      const barCls=pct>=100?'ok':pct>=60?'warn':'ng';
      const remaining=ms.goalAmount-current;
      const endD=new Date(ms.endDate);
      const daysLeft=Math.ceil((endD-new Date())/864e5);
      html+=`<div class="mission-card">
        <div class="mission-head">
          <div class="mission-name">${ms.label||card?.name||'—'}</div>
          <div class="mission-meta">${card?.name||'不明'} ／ ${ms.startDate}〜${ms.endDate}
            ${daysLeft>0?`<span style="color:var(--warn);margin-left:6px">残り${daysLeft}日</span>`:'<span style="color:var(--ng);margin-left:6px">期間終了</span>'}
          </div>
        </div>
        <div class="mission-progress-wrap">
          <div class="mission-bar-bg"><div class="mission-bar-fill ${barCls}" style="width:${pct}%"></div></div>
          <div class="mission-nums">
            <span class="mission-cur" style="color:var(--${barCls})">${fy(current)}</span>
            <span class="mission-pct">${pct}%</span>
            <span class="mission-goal">目標 ${fy(ms.goalAmount)}</span>
          </div>
          ${remaining>0?`<div style="font-size:11px;color:var(--t2);margin-top:4px">あと ${fy(remaining)} 達成まで</div>`:`<div style="font-size:11px;color:var(--ok);margin-top:4px">🎉 目標達成！</div>`}
        </div>
        <div style="display:flex;justify-content:flex-end;gap:6px;padding:0 13px 10px">
          <button class="btn btn-g btn-sm" onclick="openModal('editMission',${ms.id})">編集</button>
          <button class="btn-d" onclick="delMission(${ms.id})">削除</button>
        </div>
      </div>`;
    });
  }
  body.innerHTML=html;
}

function calcMissionProgress(ms){
  // ダッシュボードの月次データからcardIdの合計を期間内で集計
  const start=new Date(ms.startDate), end=new Date(ms.endDate);
  let total=0;
  Object.values(S.months).forEach(md=>{
    const [y,m]=md.ym.split('-').map(Number);
    const mDate=new Date(y,m-1,1);
    if(mDate>=new Date(start.getFullYear(),start.getMonth(),1) && mDate<=new Date(end.getFullYear(),end.getMonth(),1)){
      total+=(md.cardAmounts[ms.cardId]||0);
    }
  });
  return total;
}
function delMission(id){ if(!confirm('削除しますか？'))return; S.missions=S.missions.filter(m=>m.id!==id); save(); renderMission(); }

let _dragTabId=null;
function tabDragStart(e,id){ _dragTabId=id; e.dataTransfer.effectAllowed='move'; e.currentTarget.classList.add('dragging'); }
function tabDragOver(e){ e.preventDefault(); document.querySelectorAll('.tab-order-item').forEach(el=>el.classList.remove('drag-over')); e.currentTarget.classList.add('drag-over'); }
function tabDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.tab-order-item').forEach(el=>el.classList.remove('dragging','drag-over'));
  if(!_dragTabId||_dragTabId===targetId) return;
  const order=S.tabOrder||TAB_DEFS.map(t=>t.id);
  const srcDef=TAB_DEFS.find(t=>t.id===_dragTabId);
  const tgtDef=TAB_DEFS.find(t=>t.id===targetId);
  if(srcDef?.fixed||tgtDef?.fixed) return;
  const si=order.indexOf(_dragTabId), ti=order.indexOf(targetId);
  if(si<0||ti<0) return;
  order.splice(si,1); order.splice(ti,0,_dragTabId);
  S.tabOrder=order; save(); buildTabs(); renderSettingsPage();
}

// Backup
function doExport(){
  const now=new Date();
  const dateStr=`${now.getFullYear()}${z2(now.getMonth()+1)}${z2(now.getDate())}_${z2(now.getHours())}${z2(now.getMinutes())}`;
  S.backupCreatedAt=`${now.getFullYear()}/${z2(now.getMonth()+1)}/${z2(now.getDate())} ${z2(now.getHours())}:${z2(now.getMinutes())}`;
  S.lastBackup=Date.now();
  save();
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`cardboard_backup_${dateStr}.json`; a.click();
  URL.revokeObjectURL(url);
  renderSettingsPage();
  alert('バックアップを保存しました。');
}
function doImport(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.cards) throw new Error('invalid');
      if(!confirm('現在のデータをすべて上書きして復元しますか？')) return;
      S=data; save(); buildTabs(); renderDash(); renderSettingsPage();
      alert('復元しました。');
    }catch(err){ alert('ファイルが正しくありません。'); }
  };
  reader.readAsText(file);
  event.target.value='';
}

// Backup reminder on dash
function checkBackupReminder(){
  const el=document.getElementById('dash-backup-reminder');
  if(!el) return;
  if(!S.lastBackup){ el.innerHTML=''; return; }
  const days=Math.floor((Date.now()-S.lastBackup)/864e5);
  if(days>=7){
    el.innerHTML=`<div class="backup-banner">⚠ 前回バックアップから <strong>${days}日</strong> 経過<button onclick="doExport()" style="background:rgba(240,156,42,0.2);border:1px solid rgba(240,156,42,0.4);border-radius:6px;color:var(--warn);cursor:pointer;font-size:11px;font-weight:700;padding:3px 8px;margin-left:8px">今すぐ</button></div>`;
  } else { el.innerHTML=''; }
}

// ═══════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════
let _mYm='';
function mOpen(t,b,a){
  document.getElementById('m-title').textContent=t;
  document.getElementById('m-body').innerHTML=b;
  document.getElementById('m-act').innerHTML=a;
  document.getElementById('ov').classList.add('on');
}
function mClose(){ document.getElementById('ov').classList.remove('on'); }
function ovClose(e){ if(e.target===document.getElementById('ov')) mClose(); }

function bAddItem(isFixed){
  mOpen(isFixed?'固定項目を追加':'当月項目を追加',
    `<div class="frow"><label class="flbl">項目名</label><input class="finput" id="mi_l" placeholder="${isFixed?'例: 積立NISA':'例: 旅行費用'}"></div>
     <div class="frow"><label class="flbl">金額（支出はマイナス）</label><input class="finput" id="mi_a" type="number" placeholder="${isFixed?'-100000':''}"></div>`,
    `<button class="btn btn-g" onclick="mClose()">キャンセル</button><button class="btn btn-p" onclick="_saveItem(${isFixed})">追加</button>`);
}
function _saveItem(isFixed){
  const l=document.getElementById('mi_l').value.trim(), a=parseFloat(document.getElementById('mi_a').value);
  if(!l||isNaN(a)){alert('全項目を入力してください');return;}
  const md=getMD(_mYm); if(!md.items) md.items=[];
  const maxOrder=md.items.reduce((m,it)=>Math.max(m,it.order||0),0);
  md.items.push({id:S.nxtItem++,label:l,amount:a,checked:false,isFixed,order:maxOrder+1});
  save(); mClose(); renderDash();
}

function bMission(ms){
  const isEdit=!!ms;
  const cardOpts=S.cards.map(c=>`<option value="${c.id}"${ms&&ms.cardId===c.id?' selected':''}>${c.name}</option>`).join('');
  const today=todayStr();
  const oneYearLater=(() => { const d=new Date(); d.setFullYear(d.getFullYear()+1); return fmtD(d); })();
  mOpen(isEdit?'修行を編集':'修行を追加',
    `<div class="frow"><label class="flbl">ラベル（任意）</label><input class="finput" id="ms_l" value="${ms?.label||''}" placeholder="例: ヒルトン上級達成"></div>
     <div class="frow"><label class="flbl">対象カード</label><select class="finput" id="ms_c">${cardOpts}</select></div>
     <div class="frow"><label class="flbl">目標金額</label><input class="finput" id="ms_g" type="number" value="${ms?.goalAmount||''}" placeholder="例: 4000000"></div>
     <div class="fgrid">
       <div class="frow"><label class="flbl">開始日</label><input class="finput" id="ms_s" type="date" value="${ms?.startDate||today}"></div>
       <div class="frow"><label class="flbl">終了日</label><input class="finput" id="ms_e" type="date" value="${ms?.endDate||oneYearLater}"></div>
     </div>`,
    `<button class="btn btn-g" onclick="mClose()">キャンセル</button><button class="btn btn-p" onclick="_saveMission(${ms?ms.id:'null'})">保存</button>`);
}
function _saveMission(id){
  const l=document.getElementById('ms_l').value.trim();
  const cid=parseInt(document.getElementById('ms_c').value);
  const goal=parseFloat(document.getElementById('ms_g').value);
  const start=document.getElementById('ms_s').value;
  const end=document.getElementById('ms_e').value;
  if(isNaN(goal)||!start||!end){alert('必須項目を入力してください');return;}
  if(id){const m=S.missions.find(m=>m.id===id);if(m)Object.assign(m,{label:l,cardId:cid,goalAmount:goal,startDate:start,endDate:end});}
  else {if(!S.missions)S.missions=[];S.missions.push({id:S.nxtMission++,label:l,cardId:cid,goalAmount:goal,startDate:start,endDate:end});}
  save(); mClose(); renderMission();
}

function bCardManager(){
  const cardList=S.cards.map(c=>`
    <div style="display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${c.name}</div>
        <div style="font-size:10px;color:var(--t2);font-family:var(--mono)">締め日 ${c.closeDay===99?'末日':c.closeDay+'日'} ／ 引落 ${c.billDay}日</div>
        <div style="font-size:11px;color:${c.annualFee?'var(--warn)':'var(--t2)'}">${c.annualFee?fy(c.annualFee)+'（'+c.annualMonth+'月請求）':'年会費無料'}</div>
        ${c.note?`<div style="font-size:11px;color:var(--t2)">${c.note}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0">
        <div class="${c.visible?'vis-pill on':'vis-pill'}" style="display:flex;align-items:center;gap:4px;background:${c.visible?'rgba(91,141,238,0.15)':'rgba(255,255,255,0.05)'};border:1px solid ${c.visible?'rgba(91,141,238,0.3)':'rgba(255,255,255,0.1)'};border-radius:20px;padding:3px 8px 3px 5px;cursor:pointer;font-size:10px;font-weight:700;color:${c.visible?'var(--accent)':'var(--t2)'}" onclick="toggleVisInModal(${c.id})">
          <div style="width:8px;height:8px;border-radius:50%;background:currentColor"></div>${c.visible?'表示中':'非表示'}
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn btn-g btn-sm" onclick="openEditCardModal(${c.id})">編集</button>
          <button class="btn-d" onclick="delCardInModal(${c.id})">削除</button>
        </div>
      </div>
    </div>`).join('');
  mOpen('保有カード',
    `<button class="mission-add-btn" onclick="mClose();openModal('addCard')" style="margin-bottom:10px">＋ カードを追加</button>${cardList||'<div class="empty">カードなし</div>'}`,
    `<button class="btn btn-g" onclick="mClose()">閉じる</button>`);
}
function toggleVisInModal(id){ const c=S.cards.find(x=>x.id===id); if(c){c.visible=!c.visible;save();bCardManager();} }
function delCardInModal(id){ if(!confirm('削除しますか？'))return; S.cards=S.cards.filter(c=>c.id!==id); save(); bCardManager(); }
function openEditCardModal(id){ mClose(); setTimeout(()=>openModal('addCard',S.cards.find(c=>c.id===id)),200); }

function bCardForm(card){
  const c=card||{name:'',closeDay:'',billDay:'',annualFee:0,annualMonth:0,annualDay:0,note:''};
  mOpen(card?'カードを編集':'カードを追加',
    `<div class="frow"><label class="flbl">カード名</label><input class="finput" id="fc_n" value="${c.name}" placeholder="例: VISA GOLD"></div>
     <div class="fgrid">
       <div class="frow"><label class="flbl">締め日（末日=99）</label><input class="finput" id="fc_cl" type="number" value="${c.closeDay||''}"></div>
       <div class="frow"><label class="flbl">引き落とし日</label><input class="finput" id="fc_bl" type="number" value="${c.billDay||''}"></div>
     </div>
     <div class="fgrid">
       <div class="frow"><label class="flbl">年会費（0=無料）</label><input class="finput" id="fc_af" type="number" value="${c.annualFee||0}"></div>
       <div class="frow"><label class="flbl">年会費請求月</label><input class="finput" id="fc_am" type="number" value="${c.annualMonth||0}"></div>
     </div>
     <div class="frow"><label class="flbl">年会費請求日</label><input class="finput" id="fc_ad" type="number" value="${c.annualDay||0}"></div>
     <div class="frow"><label class="flbl">備考</label><input class="finput" id="fc_nt" value="${c.note||''}"></div>`,
    `<button class="btn btn-g" onclick="mClose()">キャンセル</button><button class="btn btn-p" onclick="_saveCard(${card?card.id:'null'})">保存</button>`);
}
function openModal(type,arg){
  _mYm=typeof arg==='string'?arg:'';
  if(type==='addFixed')    bAddItem(true);
  else if(type==='addOther')    bAddItem(false);
  else if(type==='addMission')  bMission(null);
  else if(type==='editMission') bMission(S.missions?.find(m=>m.id===arg));
  else if(type==='cardManager') bCardManager();
  else if(type==='addCard')     bCardForm(typeof arg==='object'?arg:null);
  document.getElementById('ov').classList.add('on');
}
function _saveCard(id){
  const n=document.getElementById('fc_n').value.trim();
  const cl=parseInt(document.getElementById('fc_cl').value);
  const bl=parseInt(document.getElementById('fc_bl').value);
  const af=parseFloat(document.getElementById('fc_af').value)||0;
  const am=parseInt(document.getElementById('fc_am').value)||0;
  const ad=parseInt(document.getElementById('fc_ad').value)||0;
  const nt=document.getElementById('fc_nt').value.trim();
  if(!n||isNaN(cl)||isNaN(bl)){alert('カード名・締め日・引き落とし日は必須です');return;}
  if(id){const c=S.cards.find(c=>c.id===id);if(c)Object.assign(c,{name:n,closeDay:cl,billDay:bl,annualFee:af,annualMonth:am,annualDay:ad,note:nt});}
  else S.cards.push({id:S.nxtCard++,name:n,closeDay:cl,billDay:bl,annualFee:af,annualMonth:am,annualDay:ad,note:nt,visible:true});
  save(); mClose();
}

<script>
// PC: サイドバーナビ生成
function buildTabs() {
  const order = (S.tabOrder||TAB_DEFS.map(t=>t.id));
  const defs = order.map(id=>TAB_DEFS.find(t=>t.id===id)).filter(Boolean);
  TAB_DEFS.forEach(t=>{ if(!defs.find(d=>d.id===t.id)) defs.push(t); });
  const nav = document.getElementById('sidebar-nav');
  if(!nav) return;
  nav.innerHTML = defs.map(t =>
    `<button class="sidebar-btn${t.id===activeTab?' on':''}" data-tab="${t.id}" onclick="goTabPC('${t.id}')">
      <span class="sidebar-btn-icon">${t.icon}</span>${t.label}
    </button>`
  ).join('');
}
function goTabPC(id) {
  activeTab = id;
  // ページ切り替え
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  const pg = document.getElementById('pg-'+id);
  if(pg) pg.classList.add('on');
  // サイドバーボタンのon状態を更新
  document.querySelectorAll('.sidebar-btn[data-tab]').forEach(b=>{
    b.classList.toggle('on', b.dataset.tab===id);
  });
  // 設定ボタンのon状態
  const stBtn = document.querySelector('.sidebar-settings .sidebar-btn');
  if(stBtn) stBtn.classList.toggle('on', id==='settings');
  // レンダリング
  if(id==='dash')     renderDash();
  if(id==='cal')      renderCal();
  if(id==='stats')    renderStats();
  if(id==='mission')  renderMission();
  if(id==='settings') renderSettingsPage();
}
buildTabs();
checkBackupReminder();
renderDash();
</script>
